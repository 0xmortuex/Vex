<!DOCTYPE html>
<html data-theme="oxford">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../../src/renderer/css/theme-tokens.css">
  <link rel="stylesheet" href="../../src/renderer/css/theme-extra.css">
  <style>
    html, body { margin: 0; width: 1280px; height: 800px; overflow: hidden;
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .win { width: 100%; height: 100%; display: flex; background: var(--bg); }
    .rail { width: 70px; background: var(--sidebar, var(--bg)); display: flex; flex-direction: column;
      align-items: center; gap: 18px; padding: 22px 0; border-right: 1px solid var(--border); }
    .rail .dot { width: 38px; height: 38px; border-radius: 11px; background: var(--surface); }
    .rail .dot.on { background: var(--primary); }
    .tabs { width: 240px; background: var(--bg-2, var(--surface)); border-right: 1px solid var(--border); padding: 22px 16px; }
    .tabs .lbl { height: 8px; width: 46px; background: var(--text-muted); opacity: .7; border-radius: 4px; margin: 0 4px 16px; }
    .tabs .t { height: 40px; border-radius: 10px; background: var(--surface); margin-bottom: 10px; display: flex; align-items: center; padding: 0 14px; gap: 10px; }
    .tabs .t.active { background: var(--tab-active); box-shadow: inset 0 0 0 1.5px var(--primary); }
    .tabs .t .fav { width: 16px; height: 16px; border-radius: 5px; background: var(--primary); opacity: .8; }
    .tabs .t .b { height: 8px; flex: 1; background: var(--text); opacity: .22; border-radius: 4px; }
    .content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 22px; background: var(--bg); }
    .clock { font: 300 84px Georgia, 'Times New Roman', serif; color: var(--text); letter-spacing: -2px; }
    .greet { font: 24px Georgia, serif; color: var(--text-muted); margin-top: -6px; }
    .greet b { color: var(--primary); font-style: italic; font-weight: 500; }
    .search { width: 460px; height: 56px; border-radius: 28px; background: var(--surface);
      border: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; gap: 14px; }
    .search .ic { width: 20px; height: 20px; border-radius: 50%; border: 2.5px solid var(--text-muted); }
    .search .ph { height: 10px; width: 180px; background: var(--text); opacity: .22; border-radius: 5px; }
    .tiles { display: flex; gap: 18px; margin-top: 4px; }
    .tiles span { width: 78px; height: 78px; border-radius: 18px; background: var(--surface); border: 1px solid var(--border); }
    .tiles span::after { content: ''; display: block; width: 30px; height: 30px; margin: 16px auto; border-radius: 9px; background: var(--primary); opacity: .55; }
  </style>
</head>
<body>
  <div class="win">
    <div class="rail"><div class="dot on"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    <div class="tabs">
      <div class="lbl"></div>
      <div class="t active"><div class="fav"></div><div class="b"></div></div>
      <div class="t"><div class="fav" style="opacity:.4"></div><div class="b"></div></div>
      <div class="t"><div class="fav" style="opacity:.4"></div><div class="b"></div></div>
      <div class="t"><div class="fav" style="opacity:.4"></div><div class="b"></div></div>
    </div>
    <div class="content">
      <div class="clock">9:41</div>
      <div class="greet">Good evening, <b>Vex</b></div>
      <div class="search"><div class="ic"></div><div class="ph"></div></div>
      <div class="tiles"><span></span><span></span><span></span><span></span></div>
    </div>
  </div>
  <script>
    const t = new URLSearchParams(location.search).get('theme') || 'oxford';
    document.documentElement.setAttribute('data-theme', t);
  </script>
</body>
</html>
