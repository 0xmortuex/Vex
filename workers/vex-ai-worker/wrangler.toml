name = "vex-ai"
main = "worker.js"
compatibility_date = "2024-01-01"

# Rate-limit store. The worker proxies a paid model with the project's
# OpenRouter key, so per-IP throttling is required to stop credit drain.
#
# Provision once, then paste the printed id below:
#   wrangler kv namespace create VEX_AI_KV
#
# Until the id is filled in, `wrangler deploy` will fail on the placeholder.
# If you need to deploy before provisioning, delete this block — the worker
# fails open (no limit) when the binding is absent.
kv_namespaces = [
  { binding = "VEX_AI_KV", id = "REPLACE_WITH_KV_NAMESPACE_ID" }
]
