    /* Oxford editorial typography on the start page — Fraunces display serif. */
    [data-theme="oxford"] .clock,
    [data-theme="oxford"] .vex-wordmark { font-family: 'Fraunces', Georgia, serif !important; }
    [data-theme="oxford"] .greeting { font-family: 'Spectral', Georgia, serif; }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { background: var(--vex-bg-base); min-height: 100vh; }

    body {
      background-image:
        radial-gradient(circle at 85% -10%, var(--vex-accent-glow) 0%, transparent 55%),
        radial-gradient(circle at 15% 110%, var(--vex-accent-glow) 0%, transparent 55%);
      background-attachment: fixed;
      color: var(--vex-text-primary);
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 72px 32px 48px;
      overflow-y: auto;
    }

    /* === Greeting === */
    .greeting-section { text-align: center; margin-bottom: 28px; }

    .clock {
      font-family: Georgia, 'Times New Roman', serif;
      font-weight: 400;
      font-size: 64px;
      letter-spacing: -0.02em;
      line-height: 1.05;
      color: var(--vex-text-primary);
    }

    .date-text {
      font-family: 'JetBrains Mono', Consolas, monospace;
      font-size: 12px;
      color: var(--vex-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      margin-top: 14px;
    }

    .greeting {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 22px;
      color: var(--vex-text-secondary);
      margin-top: 10px;
      font-weight: 400;
    }

    .greeting span {
      color: var(--vex-accent);
      font-style: italic;
      font-weight: 500;
    }

    /* === Daily Qur'an verse (Turkish) === */
    .quran-verse {
      max-width: 560px;
      margin: 22px auto 0;
      padding: 16px 22px;
      border-top: 1px solid var(--vex-border-subtle);
      border-bottom: 1px solid var(--vex-border-subtle);
    }
    .quran-text {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 16px;
      line-height: 1.7;
      font-style: italic;
      color: var(--vex-text-secondary);
    }
    .quran-ref {
      font-family: 'JetBrains Mono', Consolas, monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--vex-accent);
      margin-top: 10px;
    }

    /* Weather "set location" button + modal */
    .weather-card h4 { display: flex; align-items: center; justify-content: space-between; }
    .loc-btn {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 10.5px;
      letter-spacing: 0.04em;
      text-transform: none;
      color: var(--vex-accent);
      background: transparent;
      border: 1px solid var(--vex-border-subtle);
      border-radius: 999px;
      padding: 2px 9px;
      cursor: pointer;
    }
    .loc-btn:hover { border-color: var(--vex-accent); }
    .loc-modal {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,0.55);
      display: none; align-items: center; justify-content: center;
    }
    .loc-modal.show { display: flex; }
    .loc-modal-card {
      width: 320px; max-width: 90vw;
      background: var(--vex-glass-strong, var(--vex-glass-medium));
      backdrop-filter: var(--vex-blur-light);
      border: 1px solid var(--vex-border-subtle);
      border-radius: var(--vex-radius-lg);
      padding: 22px;
    }
    .loc-modal-card h3 { font-family: Georgia, serif; font-size: 16px; margin-bottom: 4px; color: var(--vex-text-primary); }
    .loc-modal-card p { font-size: 12px; color: var(--vex-text-muted); margin-bottom: 14px; }
    .loc-modal-card input {
      width: 100%; box-sizing: border-box; padding: 10px 12px;
      background: var(--vex-glass-medium); border: 1px solid var(--vex-border-subtle);
      border-radius: 9px; color: var(--vex-text-primary); font-size: 14px; outline: none;
      font-family: 'Space Grotesk', sans-serif;
    }
    .loc-status { font-size: 11.5px; color: var(--vex-text-muted); min-height: 16px; margin-top: 8px; }
    .loc-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
    .loc-actions button {
      padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px;
      font-family: 'Space Grotesk', sans-serif; border: 1px solid var(--vex-border-subtle);
    }
    .loc-actions .primary { background: var(--vex-accent); color: #fff; border: none; font-weight: 600; }
    .loc-actions .ghost { background: transparent; color: var(--vex-text-secondary); }

    /* Theme changer button (top-right of the start page) */
    .theme-toggle-btn {
      position: fixed; top: 18px; right: 18px; z-index: 50;
      display: inline-flex; align-items: center; gap: 7px;
      padding: 8px 14px; border-radius: 999px;
      background: var(--vex-glass-medium);
      backdrop-filter: var(--vex-blur-light);
      -webkit-backdrop-filter: var(--vex-blur-light);
      border: 1px solid var(--vex-border-subtle);
      color: var(--vex-text-secondary);
      font-family: 'Space Grotesk', sans-serif; font-size: 12.5px;
      cursor: pointer; transition: all .15s ease;
    }
    .theme-toggle-btn:hover { border-color: var(--vex-accent); color: var(--vex-text-primary); }

    /* Search engine selector */
    .engine-btn {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 7px 4px 5px; margin-right: 4px;
      background: transparent; border: 1px solid var(--vex-border-subtle);
      border-radius: 999px; cursor: pointer; color: var(--vex-text-muted);
      flex-shrink: 0;
    }
    .engine-btn:hover { border-color: var(--vex-accent); }
    .engine-glyph {
      width: 20px; height: 20px; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 12px;
      color: #fff; background: #4285F4;
    }
    .engine-menu {
      position: absolute; z-index: 60; margin-top: 6px;
      background: var(--vex-glass-strong, var(--vex-glass-medium));
      backdrop-filter: var(--vex-blur-light); -webkit-backdrop-filter: var(--vex-blur-light);
      border: 1px solid var(--vex-border-subtle); border-radius: 12px;
      padding: 6px; min-width: 200px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.4);
    }
    .engine-menu.hidden { display: none; }
    .engine-opt {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px; border-radius: 8px; cursor: pointer;
      color: var(--vex-text-secondary); font-size: 13px;
      font-family: 'Space Grotesk', sans-serif;
    }
    .engine-opt:hover { background: var(--vex-glass-light); color: var(--vex-text-primary); }
    .engine-opt .engine-glyph { width: 22px; height: 22px; font-size: 12px; }
    .engine-opt .eo-check { margin-left: auto; color: var(--vex-accent); opacity: 0; }
    .engine-opt.active .eo-check { opacity: 1; }

    /* === Wordmark === */
    .logo-section { margin: 22px 0 28px; text-align: center; }
    .vex-wordmark {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 36px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--vex-accent), color-mix(in srgb, var(--vex-accent) 65%, #ffffff));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.02em;
      opacity: 0.85;
    }

    /* === Search (hero) === */
    .search-container {
      width: 100%;
      max-width: 600px;
      margin-bottom: 56px;
      position: relative;
    }

    .search-container::before {
      content: "";
      position: absolute;
      inset: -20px;
      background: radial-gradient(ellipse at center, var(--vex-accent-glow), transparent 70%);
      border-radius: 28px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 0;
    }
    .search-container:focus-within::before { opacity: 1; }

    .search-bar {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      background: var(--vex-glass-strong);
      backdrop-filter: var(--vex-blur-medium);
      -webkit-backdrop-filter: var(--vex-blur-medium);
      border: 1px solid var(--vex-border-subtle);
      border-radius: 16px;
      padding: 16px 20px;
      gap: 14px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .search-bar:focus-within {
      border-color: var(--vex-border-accent-strong);
      box-shadow: 0 0 0 2px var(--vex-accent-dim);
    }

    .search-bar svg { color: var(--vex-text-muted); flex-shrink: 0; transition: color 0.2s ease; }
    .search-bar:focus-within svg { color: var(--vex-accent); }

    .search-bar input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--vex-text-primary);
      font-size: 16px;
      font-family: 'Outfit', sans-serif;
    }
    .search-bar input::placeholder { color: var(--vex-text-muted); }

    .search-bar kbd {
      background: var(--vex-glass-input);
      border: 1px solid var(--vex-border-subtle);
      border-radius: 5px;
      padding: 3px 8px;
      font-size: 10px;
      color: var(--vex-text-muted);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.04em;
    }

    /* === Start-page Google Suggest dropdown === */
    /* Theme-safe: tokens only (start.html inlines all 8 themes' --vex-* vars). */
    #start-suggestions {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      z-index: 5;
      background: var(--vex-glass-strong);
      backdrop-filter: var(--vex-blur-medium);
      -webkit-backdrop-filter: var(--vex-blur-medium);
      border: 1px solid var(--vex-border-medium);
      border-radius: 14px;
      box-shadow: 0 8px 28px var(--vex-accent-glow);
      padding: 6px;
      overflow: hidden;
      text-align: left;
    }
    #start-suggestions.hidden { display: none; }
    .start-suggestion {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.12s ease, color 0.12s ease;
    }
    .start-suggestion:hover,
    .start-suggestion.selected { background: var(--vex-accent-dim); }
    .start-suggestion .ss-glyph {
      flex-shrink: 0;
      color: var(--vex-text-muted);
      display: flex;
      align-items: center;
    }
    .start-suggestion:hover .ss-glyph,
    .start-suggestion.selected .ss-glyph { color: var(--vex-accent); }
    .start-suggestion .ss-text {
      flex: 1;
      min-width: 0;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      color: var(--vex-text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .start-suggestion:hover .ss-text,
    .start-suggestion.selected .ss-text { color: var(--vex-accent); }

    /* === Section headers — editorial === */
    .shortcuts-section,
    .tools-section,
    .recent-section,
    .gh-activity-section {
      width: 100%;
      max-width: 720px;
      margin-bottom: 40px;
    }

    .shortcuts-section h3,
    .tools-section h3,
    .recent-section h3,
    .gh-activity-section h3 {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--vex-text-muted);
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--vex-border-subtle);
    }

    /* === Shortcuts grid === */
    .shortcuts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
    }

    .shortcut-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 20px 12px;
      background: var(--vex-glass-medium);
      backdrop-filter: var(--vex-blur-light);
      -webkit-backdrop-filter: var(--vex-blur-light);
      border: 1px solid var(--vex-border-subtle);
      border-radius: var(--vex-radius-lg);
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      color: var(--vex-text-primary);
    }

    .shortcut-card:hover {
      background: var(--vex-accent-glow);
      border-color: var(--vex-border-accent);
      transform: translateY(-2px);
    }

    .shortcut-icon {
      width: 40px;
      height: 40px;
      border-radius: var(--vex-radius-md);
      background: var(--vex-glass-input);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      overflow: hidden;
    }
    .shortcut-icon img { width: 24px; height: 24px; border-radius: 5px; }

    .shortcut-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--vex-text-secondary);
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 100%;
      transition: color 0.2s ease;
    }
    .shortcut-card:hover .shortcut-label { color: var(--vex-text-primary); }

    /* Add-new shortcut */
    .shortcut-card.add {
      background: var(--vex-glass-input);
      border: 1px dashed var(--vex-border-accent);
      color: var(--vex-accent);
    }
    .shortcut-card.add:hover {
      background: var(--vex-accent-glow);
      border-color: var(--vex-accent);
      color: var(--vex-accent);
      transform: none;
    }
    .shortcut-card.add .shortcut-icon { background: transparent; color: inherit; }
    .shortcut-card.add .shortcut-label { color: inherit; }

    /* === My Tools horizontal rail === */
    .tools-scroll {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 8px;
      scroll-snap-type: x mandatory;
    }
    .tools-scroll::-webkit-scrollbar { height: 4px; }
    .tools-scroll::-webkit-scrollbar-thumb {
      background: var(--vex-border-medium); border-radius: 2px;
    }

    .tool-card {
      flex: 0 0 150px;
      scroll-snap-align: start;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 18px 10px;
      background: var(--vex-glass-medium);
      backdrop-filter: var(--vex-blur-light);
      -webkit-backdrop-filter: var(--vex-blur-light);
      border: 1px solid var(--vex-border-subtle);
      border-radius: var(--vex-radius-lg);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .tool-card:hover {
      background: var(--vex-accent-glow);
      border-color: var(--vex-border-accent);
      transform: translateY(-2px);
    }
    .tool-card-icon { font-size: 24px; }
    .tool-card-name {
      font-size: 13px; color: var(--vex-text-primary); font-weight: 500;
    }
    .tool-card-desc {
      font-size: 11px; color: var(--vex-text-muted); text-align: center;
    }

    /* === Weather + GitHub widget row === */
    .weather-section {
      width: 100%;
      max-width: 720px;
      margin-bottom: 40px;
      display: flex;
      gap: 14px;
    }

    .weather-card,
    .github-card,
    .cusa-widget {
      flex: 1;
      background: var(--vex-glass-medium);
      backdrop-filter: var(--vex-blur-light);
      -webkit-backdrop-filter: var(--vex-blur-light);
      border: 1px solid var(--vex-border-subtle);
      border-radius: var(--vex-radius-lg);
      padding: 22px;
    }

    .weather-card h4,
    .github-card h4,
    .cusa-widget h4 {
      font-family: Georgia, serif;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--vex-text-muted);
      margin-bottom: 14px;
      font-weight: 600;
    }

    .weather-temp {
      font-family: Georgia, serif;
      font-size: 38px;
      font-weight: 400;
      color: var(--vex-text-primary);
    }
    .weather-desc {
      font-size: 13px;
      color: var(--vex-text-muted);
      margin-top: 6px;
    }

    .github-stats { display: flex; gap: 24px; }
    .github-stat { display: flex; flex-direction: column; }
    .github-stat-value {
      font-family: Georgia, serif;
      font-size: 26px;
      font-weight: 600;
      color: var(--vex-accent);
    }
    .github-stat-label {
      font-size: 11px;
      color: var(--vex-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 2px;
    }

    .cusa-stat-row {
      display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px;
    }
    .cusa-stat-row span {
      font-size: 13px; color: var(--vex-text-secondary);
    }
    .cusa-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      background: var(--vex-accent-dim);
      color: var(--vex-accent);
      border: 1px solid var(--vex-border-accent-strong);
      border-radius: 8px;
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .cusa-btn:hover {
      background: var(--vex-accent-dim);
      color: var(--vex-text-primary);
      border-color: var(--vex-accent);
    }

    /* === Recently closed / recent === */
    .recent-list {
      display: flex; flex-direction: column; gap: 6px;
    }
    .recent-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: var(--vex-glass-light);
      border: 1px solid var(--vex-border-subtle);
      border-radius: var(--vex-radius-md);
      color: var(--vex-text-secondary);
      cursor: pointer;
      transition: all 0.15s ease;
      text-decoration: none;
    }
    .recent-item:hover {
      background: var(--vex-accent-glow);
      border-color: var(--vex-border-accent);
      color: var(--vex-text-primary);
    }
    .recent-item img { width: 16px; height: 16px; border-radius: 3px; flex-shrink: 0; }
    .recent-item-title {
      flex: 1;
      font-size: 13px;
      color: inherit;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .recent-item-url {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--vex-text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 280px;
    }

    /* === GitHub activity === */
    .gh-activity-list {
      display: flex; flex-direction: column; gap: 6px;
    }
    .gh-activity-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: var(--vex-glass-light);
      border: 1px solid var(--vex-border-subtle);
      border-radius: var(--vex-radius-md);
      transition: border-color 0.15s ease;
    }
    .gh-activity-item:hover { border-color: var(--vex-border-accent); }
    .gh-activity-repo {
      font-size: 12px;
      color: var(--vex-accent);
      font-weight: 500;
      font-family: 'JetBrains Mono', monospace;
      white-space: nowrap;
    }
    .gh-activity-msg {
      flex: 1;
      font-size: 12px;
      color: var(--vex-text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .gh-activity-time {
      font-size: 11px;
      color: var(--vex-text-muted);
      font-family: 'JetBrains Mono', monospace;
      white-space: nowrap;
    }

    @media (max-width: 600px) {
      .shortcuts-grid { grid-template-columns: repeat(2, 1fr); }
      .weather-section { flex-direction: column; }
      .clock { font-size: 48px; }
    }
  </style>
</head>
<body>
  <button class="theme-toggle-btn" id="theme-toggle-btn" title="Change theme">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="13.5" cy="6.5" r="1.4" fill="currentColor" stroke="none"/><circle cx="17" cy="11" r="1.4" fill="currentColor" stroke="none"/><circle cx="8" cy="7" r="1.4" fill="currentColor" stroke="none"/><circle cx="6.5" cy="12.5" r="1.4" fill="currentColor" stroke="none"/><path d="M12 2C6.5 2 2 6 2 11c0 3 2.4 5 5 5h1.4a2 2 0 0 1 2 2 2 2 0 0 0 2 2c4.8 0 9.6-3.6 9.6-9C22 6 17.5 2 12 2z"/></svg>
    Theme
  </button>

  <div class="greeting-section">
    <div class="clock" id="clock">00:00</div>
    <div class="date-text" id="date-text"></div>
    <div class="greeting">Good evening</div>
    <div class="quran-verse" id="quran-verse" style="display:none">
      <div class="quran-text" id="quran-text"></div>
      <div class="quran-ref" id="quran-ref"></div>
    </div>
  </div>

  <div class="logo-section">
    <div class="vex-wordmark">Vex</div>
  </div>

  <div class="search-container">
    <div class="search-bar">
      <button class="engine-btn" id="engine-btn" title="Choose search engine">
        <span class="engine-glyph" id="engine-glyph">G</span>
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
      </button>
      <input type="text" id="search-input" placeholder="Search the web..." autocomplete="off" spellcheck="false">
      <kbd>Enter</kbd>
    </div>
    <div id="engine-menu" class="engine-menu hidden"></div>
    <div id="start-suggestions" class="hidden"></div>
  </div>

  <div class="shortcuts-section">
    <h3>Quick Access</h3>
    <div class="shortcuts-grid" id="shortcuts-grid">
      <!-- Populated by JS -->
    </div>
  </div>

  <div class="tools-section">
    <h3>My Tools</h3>
    <div class="tools-scroll" id="tools-scroll"></div>
  </div>

  <div class="weather-section">
    <div class="weather-card">
      <h4>Weather <button class="loc-btn" id="weather-loc-btn" title="Set your location">📍 Set location</button></h4>
      <div class="weather-temp" id="weather-temp">--°</div>
      <div class="weather-desc" id="weather-desc">Loading...</div>
    </div>
    <div class="github-card">
      <h4>GitHub</h4>
      <div class="github-stats" id="github-stats">
        <div class="github-stat">
          <span class="github-stat-value" id="gh-repos">--</span>
          <span class="github-stat-label">Repos</span>
        </div>
        <div class="github-stat">
          <span class="github-stat-value" id="gh-followers">--</span>
          <span class="github-stat-label">Followers</span>
        </div>
      </div>
    </div>
  </div>

  <div class="recent-section">
    <h3>Recent</h3>
    <div class="recent-list" id="recent-list">
      <div class="recent-item" style="color: var(--vex-text-muted); padding: 20px; text-align: center; justify-content: center;">
        No recent history yet
      </div>
    </div>
  </div>

  <div class="gh-activity-section">
    <h3>Recent GitHub Activity</h3>
    <div class="gh-activity-list" id="gh-activity-list">
      <div class="gh-activity-item" style="justify-content:center; color:var(--vex-text-muted);">Loading...</div>
    </div>
  </div>

  <div class="loc-modal" id="loc-modal">
    <div class="loc-modal-card">
      <h3>Set your location</h3>
      <p>Type your city for accurate weather. Stored only on this device.</p>
      <input type="text" id="loc-input" placeholder="e.g. Istanbul" autocomplete="off" spellcheck="false">
      <div class="loc-status" id="loc-status"></div>
      <div class="loc-actions">
        <button class="ghost" id="loc-cancel">Cancel</button>
        <button class="primary" id="loc-save">Save</button>
      </div>
    </div>
  </div>

  <script>
    // Theme — at runtime start.html loads over file:// (get-start-page-url's
    // deliberate fallback), which BYPASSES the vex:// protocol theme-baker in
    // main.js. The cross-origin/cross-session localStorage isn't shared with
    // the main shell either, so neither server-side injection nor localStorage
    // can carry the theme here. Instead TabManager opens start tabs as
    // start.html?theme=<active> and we read that query param. Live theme
    // switches reload this page with a fresh ?theme= (see ThemeManager
    // .applyTheme). Falls back to oxford only when the param is missing/unknown.
    const VEX_THEMES = ['oxford', 'default', 'midnight', 'forest', 'ocean', 'dracula', 'nord', 'catppuccin', 'sunset', 'rose', 'matrix', 'mocha', 'solarized', 'vaporwave', 'aurora', 'crimson', 'gold', 'sakura', 'cyberpunk', 'monochrome', 'slate', 'emerald', 'amethyst', 'volcano', 'sapphire', 'honey', 'mint', 'obsidian', 'ruby', 'lime', 'bronze', 'plum', 'arctic', 'wine', 'custom'];
    function applyStartTheme(name) {
      const t = VEX_THEMES.includes(name) ? name : 'oxford';
      document.documentElement.setAttribute('data-theme', t);
      // Custom Image theme: paint the user's uploaded image as the wallpaper,
      // with a dark scrim so text stays readable.
      try {
        if (t === 'custom') {
          const img = localStorage.getItem('vex.customThemeImage');
          if (img) {
            document.body.style.backgroundImage = 'linear-gradient(rgba(8,8,12,0.62), rgba(8,8,12,0.78)), url(' + img + ')';
            document.body.style.backgroundSize = 'cover';
            document.body.style.backgroundPosition = 'center';
            document.body.style.backgroundAttachment = 'fixed';
          }
        } else {
          document.body.style.backgroundImage = '';
        }
      } catch {}
    }
    try {
      applyStartTheme(new URLSearchParams(location.search).get('theme'));
    } catch { applyStartTheme(null); }

    // Clock
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('clock').textContent = `${h}:${m}`;

      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      document.getElementById('date-text').textContent = now.toLocaleDateString('en-US', options);

      // Update greeting
      const hour = now.getHours();
      let greeting = 'Good evening';
      if (hour < 12) greeting = 'Good morning';
      else if (hour < 18) greeting = 'Good afternoon';
      // Optional personalization: set a display name in Settings (stored as
      // localStorage 'vex.userName'). Empty by default so a fresh install shows
      // a neutral greeting with no name.
      let userName = '';
      try { userName = (localStorage.getItem('vex.userName') || '').trim(); } catch {}
      const safeName = userName.replace(/[<>&"]/g, '');
      document.querySelector('.greeting').innerHTML = safeName
        ? `${greeting}, <span>${safeName}</span>`
        : greeting;
    }
    updateClock();
    setInterval(updateClock, 1000);

    // Customizable shortcuts with localStorage persistence
    const SHORTCUTS_KEY = 'vex.shortcuts';
    const defaultShortcuts = [
      { name: 'Google', url: 'https://google.com' },
      { name: 'YouTube', url: 'https://youtube.com' },
      { name: 'GitHub', url: 'https://github.com' },
      { name: 'Reddit', url: 'https://reddit.com' },
      { name: 'Wikipedia', url: 'https://wikipedia.org' },
      { name: 'ChatGPT', url: 'https://chat.openai.com', icon: 'chatgpt' },
      { name: 'Claude', url: 'https://claude.ai', icon: 'claude' }
    ];

    function loadShortcuts() {
      try { const s = localStorage.getItem(SHORTCUTS_KEY); if (s) return JSON.parse(s); } catch {}
      return defaultShortcuts;
    }
    function saveShortcuts(shortcuts) {
      localStorage.setItem(SHORTCUTS_KEY, JSON.stringify(shortcuts));
    }
    function getFavicon(url) {
      try { return 'https://www.google.com/s2/favicons?domain=' + new URL(url).hostname + '&sz=64'; } catch { return ''; }
    }

    // === Ready-made icon library (right-click a shortcut → Change icon) ===
    const ICON_LIBRARY = {
      claude:  { label: 'Claude',  color: '#d97757', svg: '<svg width="26" height="26" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" fill="none"><path d="M12 2v20M2 12h20M4.9 4.9l14.2 14.2M19.1 4.9 4.9 19.1"/></svg>' },
      chatgpt: { label: 'ChatGPT', color: '#10a37f', svg: '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 3l7.5 4.3v8.6L12 20.2 4.5 15.9V7.3L12 3z"/><circle cx="12" cy="12" r="3"/></svg>' },
      gemini:  { label: 'Gemini',  color: '#4285f4', svg: '<svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2c.5 4.8 2.2 7 7 7-4.8.5-7 2.2-7 7-.5-4.8-2.2-7-7-7 4.8-.5 7-2.2 7-7z"/></svg>' },
      globe:   { label: 'Globe',   svg: '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.5 2.5 2.5 15 0 18M12 3c-2.5 2.5-2.5 15 0 18"/></svg>' },
      search:  { label: 'Search',  svg: '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4" stroke-linecap="round"/></svg>' },
      video:   { label: 'Video',   svg: '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="14" rx="3"/><path d="M10 9l5 3-5 3z" fill="currentColor" stroke="none"/></svg>' },
      code:    { label: 'Code',    svg: '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6l-5 6 5 6M16 6l5 6-5 6"/></svg>' },
      chat:    { label: 'Chat',    svg: '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><path d="M4 5h16v11H9l-4 4z"/></svg>' },
      mail:    { label: 'Mail',    svg: '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>' },
      music:   { label: 'Music',   svg: '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/><path d="M9 18V6l12-2v12"/></svg>' },
      cart:    { label: 'Shopping',svg: '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="20" r="1.4"/><circle cx="18" cy="20" r="1.4"/><path d="M2 3h3l2.6 13h10L21 7H6"/></svg>' },
      news:    { label: 'News',    svg: '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M7 8h6M7 12h10M7 16h10" stroke-linecap="round"/></svg>' },
      image:   { label: 'Image',   svg: '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="8.5" cy="9.5" r="1.5"/><path d="M21 17l-5-5L5 21"/></svg>' },
      game:    { label: 'Games',   svg: '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="7" width="20" height="10" rx="5"/><path d="M7 12h3M8.5 10.5v3" stroke-linecap="round"/><circle cx="16" cy="11" r=".7" fill="currentColor"/><circle cx="18" cy="13" r=".7" fill="currentColor"/></svg>' },
      book:    { label: 'Book',    svg: '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><path d="M4 4h7a2 2 0 0 1 2 2v14a2 2 0 0 0-2-2H4zM20 4h-7a2 2 0 0 0-2 2v14a2 2 0 0 1 2-2h7z"/></svg>' },
      sparkle: { label: 'AI',      svg: '<svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l1.8 5.2L19 9l-5.2 1.8L12 16l-1.8-5.2L5 9l5.2-1.8z"/><path d="M18.5 14l.8 2.3 2.2.7-2.2.8-.8 2.2-.8-2.2-2.2-.8 2.2-.7z"/></svg>' },
      star:    { label: 'Star',    svg: '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><path d="M12 3l2.6 5.3 5.9.9-4.3 4.1 1 5.8L12 16.9 6.8 19.2l1-5.8-4.3-4.1 5.9-.9z"/></svg>' },
      bolt:    { label: 'Bolt',    svg: '<svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M13 2L4 14h6l-1 8 9-12h-6z"/></svg>' },
      heart:   { label: 'Social',  svg: '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><path d="M12 20s-7-4.3-9-9a4.5 4.5 0 0 1 8-3 4.5 4.5 0 0 1 8 3c-2 4.7-7 9-7 9z"/></svg>' }
    };

    // AI services the "Claude" tile (and any AI tile) can switch between.
    const AI_SERVICES = {
      claude:  { name: 'Claude',  url: 'https://claude.ai',             icon: 'claude' },
      chatgpt: { name: 'ChatGPT', url: 'https://chat.openai.com',       icon: 'chatgpt' },
      gemini:  { name: 'Gemini',  url: 'https://gemini.google.com/app', icon: 'gemini' }
    };

    function matchService(url) {
      try {
        const h = new URL(url).hostname.replace(/^www\./, '');
        if (h.includes('claude.ai') || h.includes('anthropic')) return 'claude';
        if (h.includes('openai.com') || h.includes('chatgpt.com')) return 'chatgpt';
        if (h.includes('gemini.google') || h.includes('bard.google')) return 'gemini';
      } catch {}
      return null;
    }

    function switchService(idx, id) {
      if (!AI_SERVICES[id]) return;
      shortcuts[idx] = { ...AI_SERVICES[id] };
      saveShortcuts(shortcuts);
      renderShortcuts();
    }

    function renderIcon(s) {
      if (s.icon && ICON_LIBRARY[s.icon]) {
        const ic = ICON_LIBRARY[s.icon];
        return '<span class="sc-svg" style="display:inline-flex;color:' + (ic.color || 'var(--vex-text-primary)') + '">' + ic.svg + '</span>';
      }
      const fav = getFavicon(s.url);
      return fav ? '<img src="' + fav + '" alt="">' : '<span style="font-size:20px">🔗</span>';
    }

    let shortcuts = loadShortcuts();

    function renderShortcuts() {
      const grid = document.getElementById('shortcuts-grid');
      grid.innerHTML = '';
      shortcuts.forEach((s, i) => {
        const card = document.createElement('div');
        card.className = 'shortcut-card';
        card.draggable = true;
        card.dataset.index = i;
        card.innerHTML = `
          <div class="shortcut-icon">${renderIcon(s)}</div>
          <div class="shortcut-label">${s.name}</div>
        `;
        card.addEventListener('click', (e) => {
          if (e.target.closest('.shortcut-edit-btn')) return;
          e.preventDefault();
          // Ctrl/Alt-click on a shortcut tile → open in a new tab
          const newTab = e.ctrlKey || e.altKey || e.metaKey || e.button === 1;
          console.log('VEX_CMD:' + JSON.stringify({ type: 'navigate', url: s.url, newTab }));
        });
        // Middle-click also opens in a new tab
        card.addEventListener('auxclick', (e) => {
          if (e.button !== 1) return;
          e.preventDefault();
          console.log('VEX_CMD:' + JSON.stringify({ type: 'navigate', url: s.url, newTab: true }));
        });
        card.addEventListener('contextmenu', (e) => {
          e.preventDefault();
          showShortcutMenu(e, i);
        });
        // Drag reorder
        card.addEventListener('dragstart', (e) => { e.dataTransfer.setData('text/plain', i); card.style.opacity = '0.5'; });
        card.addEventListener('dragend', () => { card.style.opacity = '1'; });
        card.addEventListener('dragover', (e) => e.preventDefault());
        card.addEventListener('drop', (e) => {
          e.preventDefault();
          const from = parseInt(e.dataTransfer.getData('text/plain'));
          if (from !== i) {
            const [moved] = shortcuts.splice(from, 1);
            shortcuts.splice(i, 0, moved);
            saveShortcuts(shortcuts);
            renderShortcuts();
          }
        });
        grid.appendChild(card);
      });
      // Add button
      const addCard = document.createElement('div');
      addCard.className = 'shortcut-card add';
      addCard.innerHTML = '<div class="shortcut-icon"><span style="font-size:22px">+</span></div><div class="shortcut-label">Add</div>';
      addCard.addEventListener('click', () => showShortcutModal(-1));
      grid.appendChild(addCard);
    }

    function showShortcutMenu(e, idx) {
      document.querySelectorAll('.ctx-menu').forEach(m => m.remove());
      const s = shortcuts[idx];
      const svc = matchService(s.url);
      const menu = document.createElement('div');
      menu.className = 'ctx-menu';
      menu.style.cssText = 'position:fixed;left:'+e.clientX+'px;top:'+e.clientY+'px;background:var(--vex-glass-strong);border:1px solid var(--vex-border-medium);border-radius:var(--vex-radius-md);padding:4px;z-index:1000;min-width:180px;box-shadow:0 8px 32px rgba(0,0,0,0.5);backdrop-filter:var(--vex-blur-medium);-webkit-backdrop-filter:var(--vex-blur-medium)';

      const items = [];
      items.push({ label: 'Open in new tab', action: () => console.log('VEX_CMD:' + JSON.stringify({ type: 'navigate', url: s.url, newTab: true })) });
      // AI tile (Claude/ChatGPT/Gemini) → quick-switch to the other services.
      if (svc) {
        items.push({ sep: true });
        ['claude', 'chatgpt', 'gemini'].filter(id => id !== svc).forEach(id => {
          items.push({ label: 'Switch to ' + AI_SERVICES[id].name, icon: id, action: () => switchService(idx, id) });
        });
      }
      items.push({ sep: true });
      items.push({ label: 'Edit name & link', action: () => showShortcutModal(idx) });
      items.push({ label: 'Change icon', action: () => showIconPicker(idx) });
      items.push({ label: 'Duplicate', action: () => { shortcuts.splice(idx + 1, 0, { ...shortcuts[idx] }); saveShortcuts(shortcuts); renderShortcuts(); } });
      items.push({ sep: true });
      items.push({ label: 'Delete', danger: true, action: () => { shortcuts.splice(idx, 1); saveShortcuts(shortcuts); renderShortcuts(); } });

      items.forEach(item => {
        if (item.sep) {
          const sep = document.createElement('div');
          sep.style.cssText = 'height:1px;background:var(--vex-border-subtle,rgba(255,255,255,0.08));margin:4px 6px';
          menu.appendChild(sep);

        }
        const el = document.createElement('div');
        const ico = item.icon && ICON_LIBRARY[item.icon]
          ? '<span style="display:inline-flex;width:16px;height:16px;color:' + (ICON_LIBRARY[item.icon].color || 'currentColor') + '">' + ICON_LIBRARY[item.icon].svg.replace('width="26" height="26"', 'width="16" height="16"') + '</span>'
          : '';
        el.innerHTML = ico + '<span>' + item.label + '</span>';
        el.style.cssText = 'display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:var(--vex-radius-sm);cursor:pointer;font-size:13px;color:' + (item.danger ? 'var(--vex-danger,#ef4444)' : 'var(--vex-text-primary)');
        el.addEventListener('mouseenter', () => el.style.background = 'var(--vex-accent-dim)');
        el.addEventListener('mouseleave', () => el.style.background = 'transparent');
        el.addEventListener('click', () => { item.action(); menu.remove(); });
        menu.appendChild(el);
      });
      document.body.appendChild(menu);
      // Keep the menu on-screen.
      const r = menu.getBoundingClientRect();
      if (r.right > window.innerWidth) menu.style.left = (window.innerWidth - r.width - 8) + 'px';
      if (r.bottom > window.innerHeight) menu.style.top = (window.innerHeight - r.height - 8) + 'px';
      setTimeout(() => { const close = (ev) => { if (!menu.contains(ev.target)) { menu.remove(); document.removeEventListener('click', close); } }; document.addEventListener('click', close); }, 0);
    }

    // Icon picker — grid of ready-made icons + the website's favicon.
    function showIconPicker(idx) {
      const s = shortcuts[idx];
      document.getElementById('icon-picker-modal')?.remove();
      const modal = document.createElement('div');
      modal.id = 'icon-picker-modal';
      modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);z-index:1001;display:flex;align-items:center;justify-content:center';
      const fav = getFavicon(s.url);
      const cell = (id, inner, color, selected) =>
        '<button class="ip-cell" data-icon="' + id + '" style="display:grid;place-items:center;width:54px;height:54px;border-radius:12px;border:1px solid ' + (selected ? 'var(--vex-accent)' : 'var(--vex-border-medium)') + ';background:' + (selected ? 'var(--vex-accent-dim)' : 'var(--vex-glass-input)') + ';color:' + (color || 'var(--vex-text-primary)') + ';cursor:pointer">' + inner + '</button>';

        + '<h3 style="font-size:16px;font-weight:600;margin-bottom:16px;color:var(--vex-text-primary)">Choose an icon</h3>'

        + '<div style="display:flex;justify-content:flex-end"><button id="ip-close" style="padding:8px 18px;background:var(--vex-glass-input);color:var(--vex-text-primary);border:1px solid var(--vex-border-medium);border-radius:var(--vex-radius-md);cursor:pointer;font-family:Outfit,sans-serif;font-size:13px">Close</button></div>'

        btn.addEventListener('click', () => {

          saveShortcuts(shortcuts);

    function showShortcutModal(idx) {
      const existing = idx >= 0 ? shortcuts[idx] : null;

      modal = document.createElement('div');

      modal.innerHTML = `<div style="width:360px;background:var(--vex-glass-strong);border:1px solid var(--vex-border-medium);border-radius:var(--vex-radius-lg);padding:24px;box-shadow:0 20px 60px rgba(0,0,0,0.5);backdrop-filter:var(--vex-blur-medium);-webkit-backdrop-filter:var(--vex-blur-medium)">
        <h3 style="font-size:16px;font-weight:600;margin-bottom:16px;color:var(--vex-text-primary)">${existing ? 'Edit' : 'Add'} Shortcut</h3>

        <div id="sc-preview" style="text-align:center;margin-bottom:14px"></div>
        <div style="display:flex;gap:8px;justify-content:flex-end">
          <button id="sc-cancel" style="padding:8px 18px;background:var(--vex-glass-input);color:var(--vex-text-primary);border:1px solid var(--vex-border-medium);border-radius:var(--vex-radius-md);cursor:pointer;font-family:Outfit,sans-serif;font-size:13px">Cancel</button>
          <button id="sc-save" style="padding:8px 18px;background:var(--vex-accent);color:#fff;border:none;border-radius:var(--vex-radius-md);cursor:pointer;font-family:Outfit,sans-serif;font-size:13px;font-weight:500">Save</button>
        </div>
      </div>`;
      document.body.appendChild(modal);

      const urlInput = modal.querySelector('#sc-url');
      const preview = modal.querySelector('#sc-preview');
      function updatePreview() {
        const fav = getFavicon(urlInput.value);
        preview.innerHTML = fav ? '<img src="'+fav+'" width="32" height="32" style="border-radius:6px">' : '';
      }
      urlInput.addEventListener('input', updatePreview);
      updatePreview();

      modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
      modal.querySelector('#sc-cancel').addEventListener('click', () => modal.remove());
      modal.querySelector('#sc-save').addEventListener('click', () => {
        const name = modal.querySelector('#sc-name').value.trim();
        const url = modal.querySelector('#sc-url').value.trim();
        if (!name || !url) return;
        if (existing) { shortcuts[idx] = { ...existing, name, url }; }
        else { shortcuts.push({ name, url }); }
        saveShortcuts(shortcuts);
        renderShortcuts();
        modal.remove();
      });
      modal.querySelector('#sc-name').focus();
      modal.querySelector('#sc-name').addEventListener('keydown', (e) => {
        if (e.key === 'Escape') modal.remove();
        if (e.key === 'Enter') modal.querySelector('#sc-save').click();

    }

    renderShortcuts();

    // Search — with Google Suggest predictions (pure web suggest; no local
    // history/tab/bookmark blending here). Suggestions come from the main
    // process via window.__vexSuggestBridge (exposed by preload-webview.js for
    // the vex:// origin) because Google Suggest sends no CORS header. Debounced,
    // stale-cancelled, and fail-silent: any error/offline → no dropdown, and
    // typing/Enter is never blocked.
    (function setupStartSearch() {
      const input = document.getElementById('search-input');
      const box = document.getElementById('start-suggestions');

      // --- Search engine selector ---
      const ENGINES = {
        google:     { name: 'Google',     q: 'https://www.google.com/search?q=%s',            glyph: 'G', color: '#4285F4' },
        bing:       { name: 'Bing',       q: 'https://www.bing.com/search?q=%s',               glyph: 'b', color: '#0c8484' },
        duckduckgo: { name: 'DuckDuckGo', q: 'https://duckduckgo.com/?q=%s',                   glyph: 'D', color: '#de5833' },
        brave:      { name: 'Brave',      q: 'https://search.brave.com/search?q=%s',           glyph: 'B', color: '#fb542b' },
        startpage:  { name: 'Startpage',  q: 'https://www.startpage.com/sp/search?query=%s',   glyph: 'S', color: '#6b4fbb' },
        ecosia:     { name: 'Ecosia',     q: 'https://www.ecosia.org/search?q=%s',             glyph: 'E', color: '#2e8b57' },
        youtube:    { name: 'YouTube',    q: 'https://www.youtube.com/results?search_query=%s', glyph: '▶', color: '#ff0000' },
      };
      function getEngineId() { try { return ENGINES[localStorage.getItem('vex.searchEngine')] ? localStorage.getItem('vex.searchEngine') : 'google'; } catch { return 'google'; } }
      let engineId = getEngineId();
      const engineBtn = document.getElementById('engine-btn');
      const engineGlyph = document.getElementById('engine-glyph');
      const engineMenu = document.getElementById('engine-menu');
      function applyEngineUI() {
        const e = ENGINES[engineId];
        if (engineGlyph) { engineGlyph.textContent = e.glyph; engineGlyph.style.background = e.color; }
        if (input) input.placeholder = 'Search with ' + e.name + '…';
        if (engineBtn) engineBtn.title = 'Search engine: ' + e.name;
      }
      function buildEngineMenu() {
        if (!engineMenu) return;
        engineMenu.innerHTML = Object.keys(ENGINES).map(id => {
          const e = ENGINES[id];
          return '<div class="engine-opt' + (id === engineId ? ' active' : '') + '" data-engine="' + id + '">' +
            '<span class="engine-glyph" style="background:' + e.color + '">' + e.glyph + '</span>' +
            '<span>' + e.name + '</span>' +
            '<svg class="eo-check" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></div>';
        }).join('');
        engineMenu.querySelectorAll('.engine-opt').forEach(opt => {
          opt.addEventListener('click', () => {
            engineId = opt.dataset.engine;
            try { localStorage.setItem('vex.searchEngine', engineId); } catch {}
            applyEngineUI();
            engineMenu.classList.add('hidden');
            input && input.focus();
          });
        });
      }
      engineBtn?.addEventListener('click', (ev) => {
        ev.stopPropagation();
        buildEngineMenu();
        engineMenu.classList.toggle('hidden');
      });
      document.addEventListener('click', (ev) => { if (engineMenu && !engineMenu.contains(ev.target) && ev.target !== engineBtn && !engineBtn?.contains(ev.target)) engineMenu.classList.add('hidden'); });
      applyEngineUI();

      const WEB_DEBOUNCE_MS = 150;
      const MAX = 8;
      let timer = null;
      let seq = 0;            // monotonic id → ignore out-of-order responses
      let results = [];       // string[] predictions
      let selectedIndex = -1;
      let open = false;

      function esc(s) { const d = document.createElement('div'); d.textContent = s == null ? '' : String(s); return d.innerHTML; }

      // Resolve a query string to a URL exactly as the start page always has
      // (URL vs Google search), then navigate via the VEX_CMD bridge.
      function navigateQuery(query, newTab) {
        query = (query || '').trim();
        if (!query) return;
        let url;
        if (/^https?:\/\//i.test(query) || /^[a-z0-9-]+\.[a-z]{2,}/i.test(query)) {
          url = query.startsWith('http') ? query : 'https://' + query;
        } else {
          const e = ENGINES[engineId] || ENGINES.google;
          url = e.q.replace('%s', encodeURIComponent(query));
        }
        console.log('VEX_CMD:' + JSON.stringify({ type: 'navigate', url, newTab }));
      }

      function close() {
        open = false; selectedIndex = -1;
        box.classList.add('hidden'); box.innerHTML = '';
      }

      function render() {
        if (!results.length) { close(); return; }
        box.innerHTML = '';
        results.forEach((s, i) => {
          const row = document.createElement('div');
          row.className = 'start-suggestion' + (i === selectedIndex ? ' selected' : '');
          row.dataset.index = String(i);
          row.innerHTML =
            `<span class="ss-glyph"><svg width="15" height="15" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.5"/><path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></span>` +
            `<span class="ss-text">${esc(s)}</span>`;
          // mousedown+preventDefault: keep focus, register click before blur.
          row.addEventListener('mousedown', (e) => { e.preventDefault(); pick(i); });
          box.appendChild(row);
        });
        box.classList.remove('hidden');
        open = true;
      }

      function refreshSelection() {
        const rows = box.querySelectorAll('.start-suggestion');
        rows.forEach((el, i) => el.classList.toggle('selected', i === selectedIndex));
        const sel = rows[selectedIndex];
        if (sel && sel.scrollIntoView) sel.scrollIntoView({ block: 'nearest' });
      }

      function pick(i) {
        const q = results[i];
        if (q == null) return;
        input.value = q;
        close();
        navigateQuery(q, false);
      }

      function fetchSuggest(q) {
        clearTimeout(timer);
        const bridge = (window.__vexSuggestBridge && typeof window.__vexSuggestBridge.suggest === 'function')
          ? window.__vexSuggestBridge.suggest : null;
        if (!q || !bridge) { results = []; close(); return; }
        const mySeq = ++seq;
        timer = setTimeout(() => {
          Promise.resolve(bridge(q)).then((list) => {
            if (mySeq !== seq) return;                      // stale → ignore
            if (input.value.trim() !== q) return;           // query moved on
            results = (Array.isArray(list) ? list : [])
              .filter(s => typeof s === 'string' && s.trim()).slice(0, MAX);
            selectedIndex = -1;
            render();
          }).catch(() => { /* fail-silent: show nothing */ });
        }, WEB_DEBOUNCE_MS);
      }

      input.addEventListener('input', () => fetchSuggest(input.value.trim()));
      input.addEventListener('blur', () => close());

      input.addEventListener('keydown', (e) => {
        if (open && results.length) {
          if (e.key === 'ArrowDown') { e.preventDefault(); selectedIndex = (selectedIndex + 1) % results.length; refreshSelection(); return; }
          if (e.key === 'ArrowUp')   { e.preventDefault(); selectedIndex = (selectedIndex - 1 + results.length) % results.length; refreshSelection(); return; }
          if (e.key === 'Escape')    { e.preventDefault(); close(); return; }
          if (e.key === 'Enter' && selectedIndex >= 0) { e.preventDefault(); pick(selectedIndex); return; }
        }
        // Typed Enter with no highlight → navigate exactly as before.
        if (e.key === 'Enter') {
          const query = e.target.value.trim();
          if (!query) return;
          close();
          navigateQuery(query, e.ctrlKey || e.altKey);
        }
      });
    })();

    // Weather. Uses a saved location (Set location button) if present, else falls
    // back to approximate IP geolocation. The "Set location" button hides once a
    // location has been saved.
    function getSavedLoc() {
      try { const l = JSON.parse(localStorage.getItem('vex.weatherLoc') || 'null'); return (l && l.lat != null && l.lon != null) ? l : null; } catch { return null; }
    }
    function syncLocBtn() {
      const btn = document.getElementById('weather-loc-btn');
      if (btn) btn.style.display = getSavedLoc() ? 'none' : '';
    }
    async function loadWeather() {
      const codes = {
        0: 'Clear sky', 1: 'Mainly clear', 2: 'Partly cloudy', 3: 'Overcast',
        45: 'Foggy', 48: 'Rime fog', 51: 'Light drizzle', 53: 'Drizzle',
        55: 'Dense drizzle', 61: 'Light rain', 63: 'Rain', 65: 'Heavy rain',
        71: 'Light snow', 73: 'Snow', 75: 'Heavy snow', 80: 'Rain showers',
        81: 'Moderate showers', 82: 'Violent showers', 95: 'Thunderstorm'
      };
      try {
        let lat, lon, city;
        const saved = getSavedLoc();
        if (saved) { lat = saved.lat; lon = saved.lon; city = saved.city; }
        else {
          const loc = await (await fetch('https://ipapi.co/json/')).json();
          lat = loc.latitude; lon = loc.longitude; city = loc.city;
        }
        const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&temperature_unit=celsius`);
        const data = await res.json();
        const temp = Math.round(data.current_weather.temperature);
        document.getElementById('weather-temp').textContent = `${temp}°C`;
        document.getElementById('weather-desc').textContent =
          (codes[data.current_weather.weathercode] || 'Unknown') + (city ? ` · ${city}` : '');
      } catch {
        document.getElementById('weather-desc').textContent = 'Unable to load weather';
      }
      syncLocBtn();
    }
    loadWeather();

    // --- Set-location modal (city → geocode via open-meteo) ---
    (function () {
      const modal = document.getElementById('loc-modal');
      const input = document.getElementById('loc-input');
      const status = document.getElementById('loc-status');
      const open = () => { modal.classList.add('show'); status.textContent = ''; input.value = ''; setTimeout(() => input.focus(), 30); };
      const close = () => modal.classList.remove('show');
      document.getElementById('weather-loc-btn')?.addEventListener('click', open);
      document.getElementById('loc-cancel')?.addEventListener('click', close);
      modal.addEventListener('click', (e) => { if (e.target === modal) close(); });
      const save = async () => {
        const q = input.value.trim();
        if (!q) { status.textContent = 'Type a city name.'; return; }
        status.textContent = 'Looking up…';
        try {
          const r = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=1&language=tr`);
          const d = await r.json();
          const hit = d && d.results && d.results[0];
          if (!hit) { status.textContent = 'Couldn’t find that place. Try another spelling.'; return; }
          const loc = { lat: hit.latitude, lon: hit.longitude, city: hit.name + (hit.country_code ? ', ' + hit.country_code : '') };
          localStorage.setItem('vex.weatherLoc', JSON.stringify(loc));
          close();
          syncLocBtn();
          loadWeather();
        } catch { status.textContent = 'Lookup failed — check your connection.'; }
      };
      document.getElementById('loc-save')?.addEventListener('click', save);
      input?.addEventListener('keydown', (e) => { if (e.key === 'Enter') save(); if (e.key === 'Escape') close(); });
    })();

    // --- Daily Qur'an verse (Turkish, Diyanet translation) ---
    async function loadQuranVerse() {
      const TOTAL = 6236;                         // total ayahs in the Qur'an
      const epochDay = Math.floor(Date.now() / 86400000);
      const ayah = (epochDay % TOTAL) + 1;        // deterministic, changes daily
      const render = (v) => {
        if (!v || !v.text) return;
        document.getElementById('quran-text').textContent = '“' + v.text + '”';
        document.getElementById('quran-ref').textContent = v.ref || '';
        document.getElementById('quran-verse').style.display = 'block';
      };
      try {
        const cached = JSON.parse(localStorage.getItem('vex.quranVerse') || 'null');
        if (cached && cached.day === epochDay && cached.text) { render(cached); return; }
      } catch {}
      try {
        const res = await fetch(`https://api.alquran.cloud/v1/ayah/${ayah}/tr.diyanet`);
        const data = await res.json();
        const a = data && data.data;
        if (a && a.text) {
          const surah = a.surah || {};
          const v = {
            day: epochDay,
            text: a.text,
            ref: (surah.englishName || 'Kur’an') + ' Suresi · ' + (surah.number || '') + ':' + (a.numberInSurah || '')
          };
          try { localStorage.setItem('vex.quranVerse', JSON.stringify(v)); } catch {}
          render(v);
        }
      } catch { /* offline / API down — leave hidden */ }
    }
    loadQuranVerse();

    // Theme button → open the app's theme picker (host handles via VEX_CMD).
    document.getElementById('theme-toggle-btn')?.addEventListener('click', () => {
      console.log('VEX_CMD:' + JSON.stringify({ type: 'open-theme-picker' }));
    });

    // Optional GitHub widget — set a username in Settings (localStorage
    // 'vex.githubUsername'). Hidden entirely until configured so a fresh
    // install doesn't show anyone's stats by default.
    function getGithubUser() {
      try { return (localStorage.getItem('vex.githubUsername') || '').trim(); } catch { return ''; }
    }

    // GitHub stats
    async function loadGitHub() {
      const ghUser = getGithubUser();
      if (!ghUser) {
        document.querySelector('.github-card')?.style.setProperty('display', 'none');
        return;
      }
      try {
        const res = await fetch('https://api.github.com/users/' + encodeURIComponent(ghUser));
        const data = await res.json();
        document.getElementById('gh-repos').textContent = data.public_repos || '0';
        document.getElementById('gh-followers').textContent = data.followers || '0';
      } catch {
        // silently fail
      }
    }
    loadGitHub();

    // My Tools — personal app shortcuts. Empty by default; users add their own
    // (stored as localStorage 'vex.startTools', an array of
    // { icon, name, desc, url }). The section hides itself when empty.
    let myTools = [];
    try { myTools = JSON.parse(localStorage.getItem('vex.startTools') || '[]'); } catch {}
    if (!Array.isArray(myTools)) myTools = [];

    const toolsScroll = document.getElementById('tools-scroll');
    if (myTools.length === 0) {
      document.querySelector('.tools-section')?.style.setProperty('display', 'none');
    }
    myTools.forEach(t => {
      const card = document.createElement('div');
      card.className = 'tool-card';
      card.innerHTML = `
        <div class="tool-card-icon">${t.icon}</div>
        <div class="tool-card-name">${t.name}</div>
        <div class="tool-card-desc">${t.desc}</div>
      `;
      card.addEventListener('click', () => {
        if (window.parent !== window) {
          window.parent.postMessage({ type: 'vex-navigate', url: t.url }, '*');
        }
      });
      toolsScroll.appendChild(card);
    });

    // Recent GitHub Activity (last 3 events) — gated on the same optional
    // username as the GitHub stats widget; hidden when unset.
    async function loadGitHubActivity() {
      const ghUser = getGithubUser();
      if (!ghUser) {
        document.querySelector('.gh-activity-section')?.style.setProperty('display', 'none');
        return;
      }
      try {
        const res = await fetch('https://api.github.com/users/' + encodeURIComponent(ghUser) + '/events/public?per_page=10');
        const events = await res.json();
        const pushEvents = events.filter(e => e.type === 'PushEvent').slice(0, 3);
        const list = document.getElementById('gh-activity-list');

        if (pushEvents.length === 0) {
          list.innerHTML = '<div class="gh-activity-item" style="justify-content:center;color:var(--vex-text-muted);">No recent activity</div>';
          return;
        }

        list.innerHTML = '';
        const ghUser = getGithubUser();
        pushEvents.forEach(ev => {
          const repo = ev.repo.name.replace(ghUser + '/', '');
          const commit = ev.payload.commits?.[ev.payload.commits.length - 1];
          const msg = commit?.message?.split('\n')[0] || 'No message';
          const time = timeAgo(new Date(ev.created_at));

          const item = document.createElement('div');
          item.className = 'gh-activity-item';
          item.innerHTML = `
            <span class="gh-activity-repo">${repo}</span>
            <span class="gh-activity-msg">${msg}</span>
            <span class="gh-activity-time">${time}</span>
          `;
          list.appendChild(item);
        });
      } catch {
        // silently fail
      }
    }

    function timeAgo(date) {
      const s = Math.floor((Date.now() - date.getTime()) / 1000);
      if (s < 60) return 'just now';
      const m = Math.floor(s / 60);
      if (m < 60) return m + 'm ago';
      const h = Math.floor(m / 60);
      if (h < 24) return h + 'h ago';
      const d = Math.floor(h / 24);
      return d + 'd ago';
    }

    loadGitHubActivity();
  </script>
</body>
</html>
