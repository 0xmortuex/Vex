<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab — Vex</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0c10;
      color: #e5e9f0;
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 40px 40px;
      overflow-y: auto;
    }

    .greeting-section {
      text-align: center;
      margin-bottom: 12px;
    }

    .clock {
      font-size: 64px;
      font-weight: 300;
      letter-spacing: -2px;
      color: #e5e9f0;
      font-family: 'Outfit', sans-serif;
    }

    .date-text {
      font-size: 16px;
      color: #6b7482;
      margin-top: 4px;
    }

    .greeting {
      font-size: 20px;
      color: #6b7482;
      margin-top: 8px;
    }

    .greeting span {
      color: #6366f1;
      font-weight: 600;
    }

    .logo-section {
      margin: 32px 0 24px;
      text-align: center;
    }

    .vex-wordmark {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 48px;
      font-weight: 700;
      background: linear-gradient(135deg, #6366f1, #00b4d8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -1px;
    }

    .search-container {
      width: 100%;
      max-width: 580px;
      margin-bottom: 48px;
    }

    .search-bar {
      display: flex;
      align-items: center;
      background: #151921;
      border: 1px solid #1f2530;
      border-radius: 12px;
      padding: 14px 18px;
      gap: 12px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-bar:focus-within {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    .search-bar svg {
      color: #6b7482;
      flex-shrink: 0;
    }

    .search-bar input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: #e5e9f0;
      font-size: 16px;
      font-family: 'Outfit', sans-serif;
    }

    .search-bar input::placeholder {
      color: #4a5060;
    }

    .search-bar kbd {
      background: #0d0f14;
      border: 1px solid #1f2530;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 11px;
      color: #6b7482;
      font-family: 'JetBrains Mono', monospace;
    }

    .shortcuts-section {
      width: 100%;
      max-width: 640px;
      margin-bottom: 48px;
    }

    .shortcuts-section h3 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #6b7482;
      margin-bottom: 16px;
      font-weight: 500;
    }

    .shortcuts-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .shortcut-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 18px 12px;
      background: #151921;
      border: 1px solid #1f2530;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      color: inherit;
    }

    .shortcut-card:hover {
      background: #1e2430;
      border-color: #2a3040;
      transform: translateY(-2px);
    }

    .shortcut-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .shortcut-icon img {
      width: 28px;
      height: 28px;
      border-radius: 6px;
    }

    .shortcut-label {
      font-size: 12px;
      color: #b0b8c8;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 100%;
    }

    .weather-section {
      width: 100%;
      max-width: 640px;
      margin-bottom: 32px;
      display: flex;
      gap: 16px;
    }

    .weather-card {
      flex: 1;
      background: #151921;
      border: 1px solid #1f2530;
      border-radius: 12px;
      padding: 20px;
    }

    .weather-card h4 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #6b7482;
      margin-bottom: 12px;
      font-weight: 500;
    }

    .weather-temp {
      font-size: 36px;
      font-weight: 300;
    }

    .weather-desc {
      font-size: 14px;
      color: #6b7482;
      margin-top: 4px;
    }

    .github-card {
      flex: 1;
      background: #151921;
      border: 1px solid #1f2530;
      border-radius: 12px;
      padding: 20px;
    }

    .github-card h4 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #6b7482;
      margin-bottom: 12px;
      font-weight: 500;
    }

    .github-stats {
      display: flex;
      gap: 24px;
    }

    .github-stat {
      display: flex;
      flex-direction: column;
    }

    .github-stat-value {
      font-size: 24px;
      font-weight: 600;
      color: #6366f1;
    }

    .github-stat-label {
      font-size: 12px;
      color: #6b7482;
    }

    .recent-section {
      width: 100%;
      max-width: 640px;
    }

    .recent-section h3 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #6b7482;
      margin-bottom: 12px;
      font-weight: 500;
    }

    .recent-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .recent-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .recent-item:hover {
      background: #151921;
    }

    .recent-item img {
      width: 16px;
      height: 16px;
      border-radius: 3px;
    }

    .recent-item-title {
      flex: 1;
      font-size: 14px;
      color: #b0b8c8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .recent-item-url {
      font-size: 12px;
      color: #4a5060;
      font-family: 'JetBrains Mono', monospace;
    }

    /* My Tools section */
    .tools-section {
      width: 100%;
      max-width: 640px;
      margin-bottom: 48px;
    }

    .tools-section h3 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #6b7482;
      margin-bottom: 16px;
      font-weight: 500;
    }

    .tools-scroll {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 8px;
      scroll-snap-type: x mandatory;
    }

    .tools-scroll::-webkit-scrollbar { height: 4px; }
    .tools-scroll::-webkit-scrollbar-thumb { background: #1f2530; border-radius: 2px; }

    .tool-card {
      flex: 0 0 140px;
      scroll-snap-align: start;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 16px 10px;
      background: #151921;
      border: 1px solid #1f2530;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tool-card:hover {
      background: #1e2430;
      border-color: #2a3040;
      transform: translateY(-2px);
    }

    .tool-card-icon { font-size: 22px; }
    .tool-card-name { font-size: 12px; color: #e5e9f0; font-weight: 500; }
    .tool-card-desc { font-size: 10px; color: #6b7482; text-align: center; }

    /* CUSA widget */
    .cusa-widget {
      flex: 1;
      background: #151921;
      border: 1px solid #1f2530;
      border-radius: 12px;
      padding: 20px;
    }

    .cusa-widget h4 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #6b7482;
      margin-bottom: 12px;
      font-weight: 500;
    }

    .cusa-stat-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 14px;
    }

    .cusa-stat-row span {
      font-size: 13px;
      color: #b0b8c8;
    }

    .cusa-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 8px;
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .cusa-btn:hover { background: #5558e6; }

    /* GitHub activity section */
    .gh-activity-section {
      width: 100%;
      max-width: 640px;
      margin-top: 32px;
    }

    .gh-activity-section h3 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #6b7482;
      margin-bottom: 12px;
      font-weight: 500;
    }

    .gh-activity-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .gh-activity-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: #151921;
      border: 1px solid #1f2530;
      border-radius: 8px;
    }

    .gh-activity-repo {
      font-size: 12px;
      color: #6366f1;
      font-weight: 500;
      white-space: nowrap;
    }

    .gh-activity-msg {
      flex: 1;
      font-size: 12px;
      color: #b0b8c8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .gh-activity-time {
      font-size: 11px;
      color: #4a5060;
      white-space: nowrap;
    }

    @media (max-width: 600px) {
      .shortcuts-grid { grid-template-columns: repeat(2, 1fr); }
      .weather-section { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="greeting-section">
    <div class="clock" id="clock">00:00</div>
    <div class="date-text" id="date-text"></div>
    <div class="greeting">Good evening, <span>Fadi</span></div>
  </div>

  <div class="logo-section">
    <div class="vex-wordmark">Vex</div>
  </div>

  <div class="search-container">
    <div class="search-bar">
      <svg width="18" height="18" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.5"/><path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <input type="text" id="search-input" placeholder="Search the web..." autocomplete="off" spellcheck="false">
      <kbd>Enter</kbd>
    </div>
  </div>

  <div class="shortcuts-section">
    <h3>Quick Access</h3>
    <div class="shortcuts-grid" id="shortcuts-grid">
      <!-- Populated by JS -->
    </div>
  </div>

  <div class="tools-section">
    <h3>My Tools</h3>
    <div class="tools-scroll" id="tools-scroll"></div>
  </div>

  <div class="weather-section">
    <div class="weather-card">
      <h4>Weather</h4>
      <div class="weather-temp" id="weather-temp">--°</div>
      <div class="weather-desc" id="weather-desc">Loading...</div>
    </div>
    <div class="github-card">
      <h4>GitHub</h4>
      <div class="github-stats" id="github-stats">
        <div class="github-stat">
          <span class="github-stat-value" id="gh-repos">--</span>
          <span class="github-stat-label">Repos</span>
        </div>
        <div class="github-stat">
          <span class="github-stat-value" id="gh-followers">--</span>
          <span class="github-stat-label">Followers</span>
        </div>
      </div>
    </div>
    <div class="cusa-widget">
      <h4>CUSA at a Glance</h4>
      <div class="cusa-stat-row">
        <span>Your Drafts: 0</span>
        <span>Active Bills: —</span>
        <span>Latest Activity: —</span>
      </div>
      <button class="cusa-btn" id="cusa-workspace-btn">Open CUSA Workspace</button>
    </div>
  </div>

  <div class="recent-section">
    <h3>Recent</h3>
    <div class="recent-list" id="recent-list">
      <div class="recent-item" style="color: #4a5060; padding: 20px; text-align: center; justify-content: center;">
        No recent history yet
      </div>
    </div>
  </div>

  <div class="gh-activity-section">
    <h3>Recent GitHub Activity</h3>
    <div class="gh-activity-list" id="gh-activity-list">
      <div class="gh-activity-item" style="justify-content:center; color:#4a5060;">Loading...</div>
    </div>
  </div>

  <script>
    // Clock
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('clock').textContent = `${h}:${m}`;

      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      document.getElementById('date-text').textContent = now.toLocaleDateString('en-US', options);

      // Update greeting
      const hour = now.getHours();
      let greeting = 'Good evening';
      if (hour < 12) greeting = 'Good morning';
      else if (hour < 18) greeting = 'Good afternoon';
      document.querySelector('.greeting').innerHTML = `${greeting}, <span>Fadi</span>`;
    }
    updateClock();
    setInterval(updateClock, 1000);

    // Customizable shortcuts with localStorage persistence
    const SHORTCUTS_KEY = 'vex.shortcuts';
    const defaultShortcuts = [
      { name: 'GitHub', url: 'https://github.com/0xmortuex' },
      { name: 'Cloudflare', url: 'https://dash.cloudflare.com' },
      { name: 'Roblox', url: 'https://roblox.com' },
      { name: 'YouTube', url: 'https://youtube.com' },
      { name: 'ChatGPT', url: 'https://chat.openai.com' },
      { name: 'Claude', url: 'https://claude.ai' },
      { name: 'Portfolio', url: 'https://mortuexos.dev' }
    ];

    function loadShortcuts() {
      try { const s = localStorage.getItem(SHORTCUTS_KEY); if (s) return JSON.parse(s); } catch {}
      return defaultShortcuts;
    }
    function saveShortcuts(shortcuts) {
      localStorage.setItem(SHORTCUTS_KEY, JSON.stringify(shortcuts));
    }
    function getFavicon(url) {
      try { return 'https://www.google.com/s2/favicons?domain=' + new URL(url).hostname + '&sz=64'; } catch { return ''; }
    }

    let shortcuts = loadShortcuts();

    function renderShortcuts() {
      const grid = document.getElementById('shortcuts-grid');
      grid.innerHTML = '';
      shortcuts.forEach((s, i) => {
        const card = document.createElement('div');
        card.className = 'shortcut-card';
        card.draggable = true;
        card.dataset.index = i;
        const icon = getFavicon(s.url);
        card.innerHTML = `
          <div class="shortcut-icon">${icon ? '<img src="'+icon+'" alt="">' : '<span style="font-size:20px">🔗</span>'}</div>
          <div class="shortcut-label">${s.name}</div>
        `;
        card.addEventListener('click', (e) => {
          if (e.target.closest('.shortcut-edit-btn')) return;
          e.preventDefault();
          console.log('VEX_CMD:' + JSON.stringify({ type: 'navigate', url: s.url }));
        });
        card.addEventListener('contextmenu', (e) => {
          e.preventDefault();
          showShortcutMenu(e, i);
        });
        // Drag reorder
        card.addEventListener('dragstart', (e) => { e.dataTransfer.setData('text/plain', i); card.style.opacity = '0.5'; });
        card.addEventListener('dragend', () => { card.style.opacity = '1'; });
        card.addEventListener('dragover', (e) => e.preventDefault());
        card.addEventListener('drop', (e) => {
          e.preventDefault();
          const from = parseInt(e.dataTransfer.getData('text/plain'));
          if (from !== i) {
            const [moved] = shortcuts.splice(from, 1);
            shortcuts.splice(i, 0, moved);
            saveShortcuts(shortcuts);
            renderShortcuts();
          }
        });
        grid.appendChild(card);
      });
      // Add button
      const addCard = document.createElement('div');
      addCard.className = 'shortcut-card';
      addCard.style.cssText = 'border-style:dashed;opacity:0.6';
      addCard.innerHTML = '<div class="shortcut-icon"><span style="font-size:24px;color:#6b7482">+</span></div><div class="shortcut-label">Add</div>';
      addCard.addEventListener('click', () => showShortcutModal(-1));
      grid.appendChild(addCard);
    }

    function showShortcutMenu(e, idx) {
      document.querySelectorAll('.ctx-menu').forEach(m => m.remove());
      const menu = document.createElement('div');
      menu.className = 'ctx-menu';
      menu.style.cssText = 'position:fixed;left:'+e.clientX+'px;top:'+e.clientY+'px;background:#151921;border:1px solid #1f2530;border-radius:8px;padding:4px;z-index:1000;min-width:140px;box-shadow:0 8px 32px rgba(0,0,0,0.5)';
      [
        { label: 'Edit', action: () => showShortcutModal(idx) },
        { label: 'Duplicate', action: () => { shortcuts.splice(idx+1, 0, {...shortcuts[idx]}); saveShortcuts(shortcuts); renderShortcuts(); } },
        { label: 'Delete', action: () => { shortcuts.splice(idx, 1); saveShortcuts(shortcuts); renderShortcuts(); }, danger: true }
      ].forEach(item => {
        const el = document.createElement('div');
        el.textContent = item.label;
        el.style.cssText = 'padding:8px 12px;border-radius:6px;cursor:pointer;font-size:13px;color:'+(item.danger?'#ef4444':'#e5e9f0');
        el.addEventListener('mouseenter', () => el.style.background = '#171c27');
        el.addEventListener('mouseleave', () => el.style.background = 'transparent');
        el.addEventListener('click', () => { item.action(); menu.remove(); });
        menu.appendChild(el);
      });
      document.body.appendChild(menu);
      setTimeout(() => { const close = (ev) => { if (!menu.contains(ev.target)) { menu.remove(); document.removeEventListener('click', close); } }; document.addEventListener('click', close); }, 0);
    }

    function showShortcutModal(idx) {
      const existing = idx >= 0 ? shortcuts[idx] : null;
      let modal = document.getElementById('shortcut-modal');
      if (modal) modal.remove();
      modal = document.createElement('div');
      modal.id = 'shortcut-modal';
      modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);z-index:1000;display:flex;align-items:center;justify-content:center';
      modal.innerHTML = `<div style="width:360px;background:#151921;border:1px solid #1f2530;border-radius:12px;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,0.5)">
        <h3 style="font-size:16px;font-weight:600;margin-bottom:16px;color:#e5e9f0">${existing ? 'Edit' : 'Add'} Shortcut</h3>
        <label style="display:block;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#6b7482;margin-bottom:6px;font-weight:500">Name</label>
        <input type="text" id="sc-name" value="${existing ? existing.name : ''}" placeholder="Shortcut name..." style="width:100%;padding:10px 12px;background:#0a0c10;border:1px solid #1f2530;border-radius:8px;color:#e5e9f0;font-size:14px;outline:none;margin-bottom:14px;box-sizing:border-box;font-family:Outfit,sans-serif">
        <label style="display:block;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#6b7482;margin-bottom:6px;font-weight:500">URL</label>
        <input type="text" id="sc-url" value="${existing ? existing.url : ''}" placeholder="https://..." style="width:100%;padding:10px 12px;background:#0a0c10;border:1px solid #1f2530;border-radius:8px;color:#e5e9f0;font-size:14px;outline:none;margin-bottom:14px;box-sizing:border-box;font-family:'JetBrains Mono',monospace">
        <div id="sc-preview" style="text-align:center;margin-bottom:14px"></div>
        <div style="display:flex;gap:8px;justify-content:flex-end">
          <button id="sc-cancel" style="padding:8px 18px;background:#0a0c10;color:#e5e9f0;border:1px solid #1f2530;border-radius:8px;cursor:pointer;font-family:Outfit,sans-serif;font-size:13px">Cancel</button>
          <button id="sc-save" style="padding:8px 18px;background:#6366f1;color:white;border:none;border-radius:8px;cursor:pointer;font-family:Outfit,sans-serif;font-size:13px;font-weight:500">Save</button>
        </div>
      </div>`;
      document.body.appendChild(modal);

      const urlInput = modal.querySelector('#sc-url');
      const preview = modal.querySelector('#sc-preview');
      function updatePreview() {
        const fav = getFavicon(urlInput.value);
        preview.innerHTML = fav ? '<img src="'+fav+'" width="32" height="32" style="border-radius:6px">' : '';
      }
      urlInput.addEventListener('input', updatePreview);
      updatePreview();

      modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
      modal.querySelector('#sc-cancel').addEventListener('click', () => modal.remove());
      modal.querySelector('#sc-save').addEventListener('click', () => {
        const name = modal.querySelector('#sc-name').value.trim();
        const url = modal.querySelector('#sc-url').value.trim();
        if (!name || !url) return;
        if (existing) { shortcuts[idx] = { name, url }; }
        else { shortcuts.push({ name, url }); }
        saveShortcuts(shortcuts);
        renderShortcuts();
        modal.remove();
      });
      modal.querySelector('#sc-name').focus();
      modal.querySelector('#sc-name').addEventListener('keydown', (e) => {
        if (e.key === 'Escape') modal.remove();
        if (e.key === 'Enter') modal.querySelector('#sc-save').click();
      });
    }

    renderShortcuts();

    // Search
    document.getElementById('search-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const query = e.target.value.trim();
        if (!query) return;
        let url;
        if (/^https?:\/\//i.test(query) || /^[a-z0-9-]+\.[a-z]{2,}/i.test(query)) {
          url = query.startsWith('http') ? query : 'https://' + query;
        } else {
          url = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
        }
        console.log('VEX_CMD:' + JSON.stringify({ type: 'navigate', url }));
      }
    });

    // Weather (open-meteo, approximate location)
    async function loadWeather() {
      try {
        const geo = await fetch('https://ipapi.co/json/');
        const loc = await geo.json();
        const lat = loc.latitude;
        const lon = loc.longitude;
        const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&temperature_unit=fahrenheit`);
        const data = await res.json();
        const temp = Math.round(data.current_weather.temperature);
        document.getElementById('weather-temp').textContent = `${temp}°F`;
        const codes = {
          0: 'Clear sky', 1: 'Mainly clear', 2: 'Partly cloudy', 3: 'Overcast',
          45: 'Foggy', 48: 'Rime fog', 51: 'Light drizzle', 53: 'Drizzle',
          55: 'Dense drizzle', 61: 'Light rain', 63: 'Rain', 65: 'Heavy rain',
          71: 'Light snow', 73: 'Snow', 75: 'Heavy snow', 80: 'Rain showers',
          81: 'Moderate showers', 82: 'Violent showers', 95: 'Thunderstorm'
        };
        document.getElementById('weather-desc').textContent =
          (codes[data.current_weather.weathercode] || 'Unknown') + ` · ${loc.city || ''}`;
      } catch {
        document.getElementById('weather-desc').textContent = 'Unable to load weather';
      }
    }
    loadWeather();

    // GitHub stats
    async function loadGitHub() {
      try {
        const res = await fetch('https://api.github.com/users/0xmortuex');
        const data = await res.json();
        document.getElementById('gh-repos').textContent = data.public_repos || '0';
        document.getElementById('gh-followers').textContent = data.followers || '0';
      } catch {
        // silently fail
      }
    }
    loadGitHub();

    // My Tools
    const myTools = [
      { icon: '\u{1F9E0}', name: 'FlashMind', desc: 'AI flashcards', url: 'https://0xmortuex.github.io/FlashMind/' },
      { icon: '\u{1F510}', name: 'CipherLab', desc: 'Crypto analysis', url: 'https://0xmortuex.github.io/CipherLab/' },
      { icon: '\u{1F5FA}', name: 'LoopholeMap', desc: 'Legal mapper', url: 'https://0xmortuex.github.io/LoopholeMap/' },
      { icon: '\u{2696}', name: 'AIJudge', desc: 'AI legal tool', url: 'https://0xmortuex.github.io/AIJudge/' },
      { icon: '\u{1F310}', name: 'NetMap', desc: 'Network mapper', url: 'https://0xmortuex.github.io/NetMap/' },
      { icon: '\u{1F528}', name: 'BillForge', desc: 'Bill drafter', url: 'https://0xmortuex.github.io/BillForge/' }
    ];

    const toolsScroll = document.getElementById('tools-scroll');
    myTools.forEach(t => {
      const card = document.createElement('div');
      card.className = 'tool-card';
      card.innerHTML = `
        <div class="tool-card-icon">${t.icon}</div>
        <div class="tool-card-name">${t.name}</div>
        <div class="tool-card-desc">${t.desc}</div>
      `;
      card.addEventListener('click', () => {
        if (window.parent !== window) {
          window.parent.postMessage({ type: 'vex-navigate', url: t.url }, '*');
        }
      });
      toolsScroll.appendChild(card);
    });

    // CUSA workspace button
    document.getElementById('cusa-workspace-btn').addEventListener('click', () => {
      console.log('VEX_CMD:' + JSON.stringify({ type: 'open-panel', panel: 'cusa' }));
    });

    // Recent GitHub Activity (last 3 events)
    async function loadGitHubActivity() {
      try {
        const res = await fetch('https://api.github.com/users/0xmortuex/events/public?per_page=10');
        const events = await res.json();
        const pushEvents = events.filter(e => e.type === 'PushEvent').slice(0, 3);
        const list = document.getElementById('gh-activity-list');

        if (pushEvents.length === 0) {
          list.innerHTML = '<div class="gh-activity-item" style="justify-content:center;color:#4a5060;">No recent activity</div>';
          return;
        }

        list.innerHTML = '';
        pushEvents.forEach(ev => {
          const repo = ev.repo.name.replace('0xmortuex/', '');
          const commit = ev.payload.commits?.[ev.payload.commits.length - 1];
          const msg = commit?.message?.split('\n')[0] || 'No message';
          const time = timeAgo(new Date(ev.created_at));

          const item = document.createElement('div');
          item.className = 'gh-activity-item';
          item.innerHTML = `
            <span class="gh-activity-repo">${repo}</span>
            <span class="gh-activity-msg">${msg}</span>
            <span class="gh-activity-time">${time}</span>
          `;
          list.appendChild(item);
        });
      } catch {
        // silently fail
      }
    }

    function timeAgo(date) {
      const s = Math.floor((Date.now() - date.getTime()) / 1000);
      if (s < 60) return 'just now';
      const m = Math.floor(s / 60);
      if (m < 60) return m + 'm ago';
      const h = Math.floor(m / 60);
      if (h < 24) return h + 'h ago';
      const d = Math.floor(h / 24);
      return d + 'd ago';
    }

    loadGitHubActivity();
  </script>
