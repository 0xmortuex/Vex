<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab — Vex</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0c10;
      color: #e5e9f0;
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 40px 40px;
      overflow-y: auto;
    }

    .greeting-section {
      text-align: center;
      margin-bottom: 12px;
    }

    .clock {
      font-size: 64px;
      font-weight: 300;
      letter-spacing: -2px;
      color: #e5e9f0;
      font-family: 'Outfit', sans-serif;
    }

    .date-text {
      font-size: 16px;
      color: #6b7482;
      margin-top: 4px;
    }

    .greeting {
      font-size: 20px;
      color: #6b7482;
      margin-top: 8px;
    }

    .greeting span {
      color: #6366f1;
      font-weight: 600;
    }

    .logo-section {
      margin: 32px 0 24px;
      text-align: center;
    }

    .vex-wordmark {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 48px;
      font-weight: 700;
      background: linear-gradient(135deg, #6366f1, #00b4d8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -1px;
    }

    .search-container {
      width: 100%;
      max-width: 580px;
      margin-bottom: 48px;
    }

    .search-bar {
      display: flex;
      align-items: center;
      background: #151921;
      border: 1px solid #1f2530;
      border-radius: 12px;
      padding: 14px 18px;
      gap: 12px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-bar:focus-within {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    .search-bar svg {
      color: #6b7482;
      flex-shrink: 0;
    }

    .search-bar input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: #e5e9f0;
      font-size: 16px;
      font-family: 'Outfit', sans-serif;
    }

    .search-bar input::placeholder {
      color: #4a5060;
    }

    .search-bar kbd {
      background: #0d0f14;
      border: 1px solid #1f2530;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 11px;
      color: #6b7482;
      font-family: 'JetBrains Mono', monospace;
    }

    .shortcuts-section {
      width: 100%;
      max-width: 640px;
      margin-bottom: 48px;
    }

    .shortcuts-section h3 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #6b7482;
      margin-bottom: 16px;
      font-weight: 500;
    }

    .shortcuts-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .shortcut-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 18px 12px;
      background: #151921;
      border: 1px solid #1f2530;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      color: inherit;
    }

    .shortcut-card:hover {
      background: #1e2430;
      border-color: #2a3040;
      transform: translateY(-2px);
    }

    .shortcut-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .shortcut-icon img {
      width: 28px;
      height: 28px;
      border-radius: 6px;
    }

    .shortcut-label {
      font-size: 12px;
      color: #b0b8c8;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 100%;
    }

    .weather-section {
      width: 100%;
      max-width: 640px;
      margin-bottom: 32px;
      display: flex;
      gap: 16px;
    }

    .weather-card {
      flex: 1;
      background: #151921;
      border: 1px solid #1f2530;
      border-radius: 12px;
      padding: 20px;
    }

    .weather-card h4 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #6b7482;
      margin-bottom: 12px;
      font-weight: 500;
    }

    .weather-temp {
      font-size: 36px;
      font-weight: 300;
    }

    .weather-desc {
      font-size: 14px;
      color: #6b7482;
      margin-top: 4px;
    }

    .github-card {
      flex: 1;
      background: #151921;
      border: 1px solid #1f2530;
      border-radius: 12px;
      padding: 20px;
    }

    .github-card h4 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #6b7482;
      margin-bottom: 12px;
      font-weight: 500;
    }

    .github-stats {
      display: flex;
      gap: 24px;
    }

    .github-stat {
      display: flex;
      flex-direction: column;
    }

    .github-stat-value {
      font-size: 24px;
      font-weight: 600;
      color: #6366f1;
    }

    .github-stat-label {
      font-size: 12px;
      color: #6b7482;
    }

    .recent-section {
      width: 100%;
      max-width: 640px;
    }

    .recent-section h3 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #6b7482;
      margin-bottom: 12px;
      font-weight: 500;
    }

    .recent-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .recent-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .recent-item:hover {
      background: #151921;
    }

    .recent-item img {
      width: 16px;
      height: 16px;
      border-radius: 3px;
    }

    .recent-item-title {
      flex: 1;
      font-size: 14px;
      color: #b0b8c8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .recent-item-url {
      font-size: 12px;
      color: #4a5060;
      font-family: 'JetBrains Mono', monospace;
    }

    /* My Tools section */
    .tools-section {
      width: 100%;
      max-width: 640px;
      margin-bottom: 48px;
    }

    .tools-section h3 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #6b7482;
      margin-bottom: 16px;
      font-weight: 500;
    }

    .tools-scroll {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 8px;
      scroll-snap-type: x mandatory;
    }

    .tools-scroll::-webkit-scrollbar { height: 4px; }
    .tools-scroll::-webkit-scrollbar-thumb { background: #1f2530; border-radius: 2px; }

    .tool-card {
      flex: 0 0 140px;
      scroll-snap-align: start;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 16px 10px;
      background: #151921;
      border: 1px solid #1f2530;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tool-card:hover {
      background: #1e2430;
      border-color: #2a3040;
      transform: translateY(-2px);
    }

    .tool-card-icon { font-size: 22px; }
    .tool-card-name { font-size: 12px; color: #e5e9f0; font-weight: 500; }
    .tool-card-desc { font-size: 10px; color: #6b7482; text-align: center; }

    /* CUSA widget */
    .cusa-widget {
      flex: 1;
      background: #151921;
      border: 1px solid #1f2530;
      border-radius: 12px;
      padding: 20px;
    }

    .cusa-widget h4 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #6b7482;
      margin-bottom: 12px;
      font-weight: 500;
    }

    .cusa-stat-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 14px;
    }

    .cusa-stat-row span {
      font-size: 13px;
      color: #b0b8c8;
    }

    .cusa-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 8px;
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .cusa-btn:hover { background: #5558e6; }

    /* GitHub activity section */
    .gh-activity-section {
      width: 100%;
      max-width: 640px;
      margin-top: 32px;
    }

    .gh-activity-section h3 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #6b7482;
      margin-bottom: 12px;
      font-weight: 500;
    }

    .gh-activity-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .gh-activity-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: #151921;
      border: 1px solid #1f2530;
      border-radius: 8px;
    }

    .gh-activity-repo {
      font-size: 12px;
      color: #6366f1;
      font-weight: 500;
      white-space: nowrap;
    }

    .gh-activity-msg {
      flex: 1;
      font-size: 12px;
      color: #b0b8c8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .gh-activity-time {
      font-size: 11px;
      color: #4a5060;
      white-space: nowrap;
    }

    @media (max-width: 600px) {
      .shortcuts-grid { grid-template-columns: repeat(2, 1fr); }
      .weather-section { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="greeting-section">
    <div class="clock" id="clock">00:00</div>
    <div class="date-text" id="date-text"></div>
    <div class="greeting">Good evening, <span>Fadi</span></div>
  </div>

  <div class="logo-section">
    <div class="vex-wordmark">Vex</div>
  </div>

  <div class="search-container">
    <div class="search-bar">
      <svg width="18" height="18" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.5"/><path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <input type="text" id="search-input" placeholder="Search the web..." autocomplete="off" spellcheck="false">
      <kbd>Enter</kbd>
    </div>
  </div>

  <div class="shortcuts-section">
    <h3>Quick Access</h3>
    <div class="shortcuts-grid" id="shortcuts-grid">
      <!-- Populated by JS -->
    </div>
  </div>

  <div class="tools-section">
    <h3>My Tools</h3>
    <div class="tools-scroll" id="tools-scroll"></div>
  </div>

  <div class="weather-section">
    <div class="weather-card">
      <h4>Weather</h4>
      <div class="weather-temp" id="weather-temp">--°</div>
      <div class="weather-desc" id="weather-desc">Loading...</div>
    </div>
    <div class="github-card">
      <h4>GitHub</h4>
      <div class="github-stats" id="github-stats">
        <div class="github-stat">
          <span class="github-stat-value" id="gh-repos">--</span>
          <span class="github-stat-label">Repos</span>
        </div>
        <div class="github-stat">
          <span class="github-stat-value" id="gh-followers">--</span>
          <span class="github-stat-label">Followers</span>
        </div>
      </div>
    </div>
    <div class="cusa-widget">
      <h4>CUSA at a Glance</h4>
      <div class="cusa-stat-row">
        <span>Your Drafts: 0</span>
        <span>Active Bills: —</span>
        <span>Latest Activity: —</span>
      </div>
      <button class="cusa-btn" id="cusa-workspace-btn">Open CUSA Workspace</button>
    </div>
  </div>

  <div class="recent-section">
    <h3>Recent</h3>
    <div class="recent-list" id="recent-list">
      <div class="recent-item" style="color: #4a5060; padding: 20px; text-align: center; justify-content: center;">
        No recent history yet
      </div>
    </div>
  </div>

  <div class="gh-activity-section">
    <h3>Recent GitHub Activity</h3>
    <div class="gh-activity-list" id="gh-activity-list">
      <div class="gh-activity-item" style="justify-content:center; color:#4a5060;">Loading...</div>
    </div>
  </div>

  <script>
    // Clock
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('clock').textContent = `${h}:${m}`;

      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      document.getElementById('date-text').textContent = now.toLocaleDateString('en-US', options);

      // Update greeting
      const hour = now.getHours();
      let greeting = 'Good evening';
      if (hour < 12) greeting = 'Good morning';
      else if (hour < 18) greeting = 'Good afternoon';
      document.querySelector('.greeting').innerHTML = `${greeting}, <span>Fadi</span>`;
    }
    updateClock();
    setInterval(updateClock, 1000);

    // Default shortcuts
    const defaultShortcuts = [
      { name: 'GitHub', url: 'https://github.com/0xmortuex', icon: 'https://www.google.com/s2/favicons?domain=github.com&sz=64' },
      { name: 'Cloudflare', url: 'https://dash.cloudflare.com', icon: 'https://www.google.com/s2/favicons?domain=cloudflare.com&sz=64' },
      { name: 'CUSA Discord', url: 'https://discord.com', icon: 'https://www.google.com/s2/favicons?domain=discord.com&sz=64' },
      { name: 'Roblox', url: 'https://roblox.com', icon: 'https://www.google.com/s2/favicons?domain=roblox.com&sz=64' },
      { name: 'YouTube', url: 'https://youtube.com', icon: 'https://www.google.com/s2/favicons?domain=youtube.com&sz=64' },
      { name: 'ChatGPT', url: 'https://chat.openai.com', icon: 'https://www.google.com/s2/favicons?domain=chat.openai.com&sz=64' },
      { name: 'Claude', url: 'https://claude.ai', icon: 'https://www.google.com/s2/favicons?domain=claude.ai&sz=64' },
      { name: 'Portfolio', url: 'https://mortuexos.dev', icon: 'https://www.google.com/s2/favicons?domain=mortuexos.dev&sz=64' }
    ];

    // Render shortcuts
    const grid = document.getElementById('shortcuts-grid');
    defaultShortcuts.forEach(s => {
      const card = document.createElement('a');
      card.className = 'shortcut-card';
      card.href = s.url;
      card.innerHTML = `
        <div class="shortcut-icon"><img src="${s.icon}" alt="${s.name}"></div>
        <div class="shortcut-label">${s.name}</div>
      `;
      card.addEventListener('click', (e) => {
        e.preventDefault();
        // Communicate with parent via postMessage
        console.log('VEX_CMD:' + JSON.stringify({ type: 'navigate', url: s.url }));
      });
      grid.appendChild(card);
    });

    // Search
    document.getElementById('search-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const query = e.target.value.trim();
        if (!query) return;
        let url;
        if (/^https?:\/\//i.test(query) || /^[a-z0-9-]+\.[a-z]{2,}/i.test(query)) {
          url = query.startsWith('http') ? query : 'https://' + query;
        } else {
          url = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
        }
        console.log('VEX_CMD:' + JSON.stringify({ type: 'navigate', url }));
      }
    });

    // Weather (open-meteo, approximate location)
    async function loadWeather() {
      try {
        const geo = await fetch('https://ipapi.co/json/');
        const loc = await geo.json();
        const lat = loc.latitude;
        const lon = loc.longitude;
        const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&temperature_unit=fahrenheit`);
        const data = await res.json();
        const temp = Math.round(data.current_weather.temperature);
        document.getElementById('weather-temp').textContent = `${temp}°F`;
        const codes = {
          0: 'Clear sky', 1: 'Mainly clear', 2: 'Partly cloudy', 3: 'Overcast',
          45: 'Foggy', 48: 'Rime fog', 51: 'Light drizzle', 53: 'Drizzle',
          55: 'Dense drizzle', 61: 'Light rain', 63: 'Rain', 65: 'Heavy rain',
          71: 'Light snow', 73: 'Snow', 75: 'Heavy snow', 80: 'Rain showers',
          81: 'Moderate showers', 82: 'Violent showers', 95: 'Thunderstorm'
        };
        document.getElementById('weather-desc').textContent =
          (codes[data.current_weather.weathercode] || 'Unknown') + ` · ${loc.city || ''}`;
      } catch {
        document.getElementById('weather-desc').textContent = 'Unable to load weather';
      }
    }
    loadWeather();

    // GitHub stats
    async function loadGitHub() {
      try {
        const res = await fetch('https://api.github.com/users/0xmortuex');
        const data = await res.json();
        document.getElementById('gh-repos').textContent = data.public_repos || '0';
        document.getElementById('gh-followers').textContent = data.followers || '0';
      } catch {
        // silently fail
      }
    }
    loadGitHub();

    // My Tools
    const myTools = [
      { icon: '\u{1F9E0}', name: 'FlashMind', desc: 'AI flashcards', url: 'https://0xmortuex.github.io/FlashMind/' },
      { icon: '\u{1F50D}', name: 'ReconX', desc: 'OSINT toolkit', url: 'https://0xmortuex.github.io/ReconX/' },
      { icon: '\u{1F510}', name: 'CipherLab', desc: 'Crypto analysis', url: 'https://0xmortuex.github.io/CipherLab/' },
      { icon: '\u{1F5FA}', name: 'LoopholeMap', desc: 'Legal mapper', url: 'https://0xmortuex.github.io/LoopholeMap/' },
      { icon: '\u{2696}', name: 'AIJudge', desc: 'AI legal tool', url: 'https://0xmortuex.github.io/AIJudge/' },
      { icon: '\u{1F310}', name: 'NetMap', desc: 'Network mapper', url: 'https://0xmortuex.github.io/NetMap/' },
      { icon: '\u{1F528}', name: 'BillForge', desc: 'Bill drafter', url: 'https://0xmortuex.github.io/BillForge/' }
    ];

    const toolsScroll = document.getElementById('tools-scroll');
    myTools.forEach(t => {
      const card = document.createElement('div');
      card.className = 'tool-card';
      card.innerHTML = `
        <div class="tool-card-icon">${t.icon}</div>
        <div class="tool-card-name">${t.name}</div>
        <div class="tool-card-desc">${t.desc}</div>
      `;
      card.addEventListener('click', () => {
        if (window.parent !== window) {
          window.parent.postMessage({ type: 'vex-navigate', url: t.url }, '*');
        }
      });
      toolsScroll.appendChild(card);
    });

    // CUSA workspace button
    document.getElementById('cusa-workspace-btn').addEventListener('click', () => {
      console.log('VEX_CMD:' + JSON.stringify({ type: 'open-panel', panel: 'cusa' }));
    });

    // Recent GitHub Activity (last 3 events)
    async function loadGitHubActivity() {
      try {
        const res = await fetch('https://api.github.com/users/0xmortuex/events/public?per_page=10');
        const events = await res.json();
        const pushEvents = events.filter(e => e.type === 'PushEvent').slice(0, 3);
        const list = document.getElementById('gh-activity-list');

        if (pushEvents.length === 0) {
          list.innerHTML = '<div class="gh-activity-item" style="justify-content:center;color:#4a5060;">No recent activity</div>';
          return;
        }

        list.innerHTML = '';
        pushEvents.forEach(ev => {
          const repo = ev.repo.name.replace('0xmortuex/', '');
          const commit = ev.payload.commits?.[ev.payload.commits.length - 1];
          const msg = commit?.message?.split('\n')[0] || 'No message';
          const time = timeAgo(new Date(ev.created_at));

          const item = document.createElement('div');
          item.className = 'gh-activity-item';
          item.innerHTML = `
            <span class="gh-activity-repo">${repo}</span>
            <span class="gh-activity-msg">${msg}</span>
            <span class="gh-activity-time">${time}</span>
          `;
          list.appendChild(item);
        });
      } catch {
        // silently fail
      }
    }

    function timeAgo(date) {
      const s = Math.floor((Date.now() - date.getTime()) / 1000);
      if (s < 60) return 'just now';
      const m = Math.floor(s / 60);
      if (m < 60) return m + 'm ago';
      const h = Math.floor(m / 60);
      if (h < 24) return h + 'h ago';
      const d = Math.floor(h / 24);
      return d + 'd ago';
    }

    loadGitHubActivity();
  </script>
</body>
</html>
