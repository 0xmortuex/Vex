<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vex</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
  <link rel="stylesheet" href="css/tabs.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/command.css">
  <link rel="stylesheet" href="css/panels.css">
  <link rel="stylesheet" href="css/split.css">
  <link rel="stylesheet" href="css/sessions.css">
  <link rel="stylesheet" href="css/workspaces.css">
  <link rel="stylesheet" href="css/notes-panel.css">
  <link rel="stylesheet" href="css/downloads-panel.css">
</head>
<body>
  <!-- Top Bar -->
  <div id="top-bar">
    <div id="top-bar-drag"></div>

    <div id="top-bar-left">
      <span id="vex-logo">Vex</span>
      <div id="workspace-switcher">
        <button id="workspace-btn"><span class="ws-dot" style="background:#6366f1"></span>Personal<svg viewBox="0 0 10 10"><path d="M2 4L5 7L8 4" stroke="currentColor" stroke-width="1.3" fill="none"/></svg></button>
        <div id="workspace-dropdown"></div>
      </div>
      <div id="nav-buttons">
        <button id="btn-back" class="nav-btn" title="Back (Alt+Left)">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8L10 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button id="btn-forward" class="nav-btn" title="Forward (Alt+Right)">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 4L10 8L6 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button id="btn-reload" class="nav-btn" title="Reload (Ctrl+R)">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M13.5 8C13.5 11.038 11.038 13.5 8 13.5C4.962 13.5 2.5 11.038 2.5 8C2.5 4.962 4.962 2.5 8 2.5C9.842 2.5 11.47 3.395 12.5 4.772" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M12.5 2V5H9.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </div>

    <div id="url-bar-wrapper">
      <div id="url-bar">
        <svg id="url-icon" width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.2"/><path d="M8 2.5V13.5M2.5 8H13.5M3.5 5H12.5M3.5 11H12.5" stroke="currentColor" stroke-width="1"/></svg>
        <input type="text" id="url-input" placeholder="Search or enter URL..." spellcheck="false" autocomplete="off">
      </div>
    </div>

    <div id="top-bar-right">
      <button id="btn-split" title="Split Screen (Ctrl+Shift+S)">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1.5" y="2.5" width="5.5" height="11" rx="1" stroke="currentColor" stroke-width="1.3"/><rect x="9" y="2.5" width="5.5" height="11" rx="1" stroke="currentColor" stroke-width="1.3"/></svg>
      </button>
      <button id="btn-command" class="nav-btn" title="Command Bar (Ctrl+K)">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.5"/><path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
      <div id="window-controls">
        <button id="btn-minimize" class="win-btn" title="Minimize">
          <svg width="12" height="12" viewBox="0 0 12 12"><rect x="2" y="5.5" width="8" height="1" fill="currentColor"/></svg>
        </button>
        <button id="btn-maximize" class="win-btn" title="Maximize">
          <svg width="12" height="12" viewBox="0 0 12 12"><rect x="2" y="2" width="8" height="8" rx="1" stroke="currentColor" stroke-width="1" fill="none"/></svg>
        </button>
        <button id="btn-close" class="win-btn win-btn-close" title="Close">
          <svg width="12" height="12" viewBox="0 0 12 12"><path d="M3 3L9 9M9 3L3 9" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Main Layout -->
  <div id="main-layout">
    <!-- Icon Sidebar -->
    <div id="icon-sidebar">
      <button class="sidebar-icon active" data-panel="start" title="Start Page">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M3 7.5L10 2.5L17 7.5V16C17 16.55 16.55 17 16 17H4C3.45 17 3 16.55 3 16V7.5Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M7.5 17V10.5H12.5V17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="sidebar-icon" data-panel="discord" title="Discord">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M7.5 9.5C7.5 9.5 7 9.5 7 10C7 10.5 7.5 10.5 7.5 10.5C7.5 10.5 8 10.5 8 10C8 9.5 7.5 9.5 7.5 9.5ZM12.5 9.5C12.5 9.5 12 9.5 12 10C12 10.5 12.5 10.5 12.5 10.5C12.5 10.5 13 10.5 13 10C13 9.5 12.5 9.5 12.5 9.5Z" fill="currentColor"/><path d="M15.5 3H4.5C3.67 3 3 3.67 3 4.5V14.5C3 15.33 3.67 16 4.5 16H13.5L13.1 14.5L14.3 15.6L15.4 16.6L17 18V4.5C17 3.67 16.33 3 15.5 3ZM12.4 12.7C12.4 12.7 12.1 12.3 11.8 12C12.9 11.7 13.3 11 13.3 11C13 11.2 12.7 11.3 12.4 11.4C12 11.6 11.6 11.7 11.2 11.7C10.4 11.8 9.6 11.7 9 11.5C8.5 11.3 8.1 11.1 7.8 10.9C7.7 10.8 7.5 10.7 7.4 10.6L7.3 10.5C7.3 10.5 7.7 11.2 8.7 11.5C8.4 12 8.1 12.4 8.1 12.4C6.4 12.4 5.8 11.2 5.8 11.2C5.8 8.7 6.9 6.7 6.9 6.7C8 5.9 9 5.9 9 5.9L9.1 6C7.7 6.4 7.1 7 7.1 7C7.1 7 7.3 6.9 7.6 6.7C8.4 6.3 9 6.2 9.3 6.2H9.4C9.9 6.1 10.5 6.1 11.2 6.2C12 6.3 12.9 6.6 13.8 7C13.8 7 13.2 6.4 11.9 6L12 5.9C12 5.9 13 5.9 14.1 6.7C14.1 6.7 15.2 8.7 15.2 11.2C15.2 11.2 14.5 12.4 12.4 12.7Z" fill="currentColor"/></svg>
      </button>
      <button class="sidebar-icon" data-panel="whatsapp" title="WhatsApp">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 2C5.58 2 2 5.58 2 10C2 11.5 2.42 12.9 3.15 14.1L2.3 17.7L6 16.87C7.12 17.55 8.5 17.95 10 17.95C14.42 17.95 18 14.37 18 9.95C18 5.58 14.42 2 10 2ZM14.1 13C13.87 13.6 12.95 14.1 12.3 14.2C11.8 14.28 11.15 14.32 10.45 14.08C10 13.92 9.42 13.72 8.72 13.32C6.7 12.15 5.4 10.08 5.3 9.95C5.2 9.82 4.4 8.77 4.4 7.68C4.4 6.58 4.95 6.05 5.15 5.82C5.35 5.6 5.58 5.55 5.72 5.55H6.15C6.28 5.55 6.45 5.5 6.62 5.9C6.8 6.32 7.22 7.42 7.27 7.52C7.32 7.62 7.35 7.75 7.28 7.88C7.02 8.38 6.7 8.35 6.85 8.6C7.42 9.58 8.12 10.2 9.05 10.72C9.25 10.82 9.38 10.8 9.5 10.65C9.62 10.5 10.02 10.02 10.15 9.82C10.28 9.62 10.42 9.65 10.62 9.72C10.82 9.8 11.9 10.32 12.12 10.45C12.32 10.55 12.47 10.62 12.52 10.72C12.58 10.85 12.58 11.38 12.35 12C12.1 12.6 14.1 13 14.1 13Z" fill="currentColor"/></svg>
      </button>
      <button class="sidebar-icon" data-panel="claude" title="Claude AI">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 2L3 6V14L10 18L17 14V6L10 2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.5"/></svg>
      </button>
      <button class="sidebar-icon" data-panel="cusa" title="CUSA Workspace">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 2L4 5V9C4 13.42 6.56 17.5 10 18.5C13.44 17.5 16 13.42 16 9V5L10 2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M8 10L9.5 11.5L12.5 8.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="sidebar-icon" data-panel="roblox" title="Roblox Hub">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="4" y="6" width="12" height="8" rx="2" stroke="currentColor" stroke-width="1.5"/><circle cx="7.5" cy="10" r="1" fill="currentColor"/><circle cx="12.5" cy="10" r="1" fill="currentColor"/><path d="M2 10H4M16 10H18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
      <button class="sidebar-icon" data-panel="github" title="GitHub">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 2C5.58 2 2 5.58 2 10C2 13.54 4.29 16.53 7.47 17.59C7.87 17.66 8.02 17.42 8.02 17.21V15.63C5.73 16.13 5.26 14.56 5.26 14.56C4.89 13.63 4.35 13.39 4.35 13.39C3.6 12.87 4.4 12.88 4.4 12.88C5.23 12.93 5.66 13.73 5.66 13.73C6.4 14.98 7.57 14.62 8.05 14.42C8.12 13.87 8.33 13.5 8.57 13.29C6.73 13.08 4.8 12.32 4.8 9.29C4.8 8.42 5.12 7.71 5.68 7.16C5.6 6.95 5.33 6.13 5.76 5.04C5.76 5.04 6.46 4.82 8.01 5.84C8.68 5.66 9.34 5.57 10 5.57C10.66 5.57 11.32 5.66 11.99 5.84C13.54 4.82 14.24 5.04 14.24 5.04C14.67 6.13 14.4 6.95 14.32 7.16C14.88 7.71 15.2 8.42 15.2 9.29C15.2 12.33 13.26 13.07 11.42 13.28C11.72 13.54 12 14.06 12 14.85V17.21C12 17.42 12.15 17.67 12.55 17.59C15.73 16.53 18 13.54 18 10C18 5.58 14.42 2 10 2Z" fill="currentColor"/></svg>
      </button>
      <button class="sidebar-icon" data-panel="notes" title="Notes (Ctrl+Shift+N)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      </button>
      <button class="sidebar-icon" data-panel="downloads" title="Downloads">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </button>
      <div class="sidebar-spacer"></div>
      <button class="sidebar-icon" data-panel="settings" title="Settings">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="2" stroke="currentColor" stroke-width="1.5"/><path d="M10 2.5V4.5M10 15.5V17.5M2.5 10H4.5M15.5 10H17.5M4.34 4.34L5.76 5.76M14.24 14.24L15.66 15.66M15.66 4.34L14.24 5.76M5.76 14.24L4.34 15.66" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
      <div class="sidebar-separator"></div>
      <div id="tools-bar"></div>
    </div>

    <!-- Tabs Sidebar -->
    <div id="tabs-sidebar">
      <div id="tabs-header">
        <span id="tabs-title">Tabs</span>
        <button id="btn-new-tab" title="New Tab (Ctrl+T)">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 2V12M2 7H12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div id="tab-groups-container"></div>
      <div id="tabs-list"></div>
    </div>

    <!-- Content Area -->
    <div id="content-area">
      <!-- Sidebar Panels (hidden by default) -->
      <div id="panels-container">
        <div class="panel" id="panel-start" style="display: none;"></div>
        <div class="panel" id="panel-discord" style="display: none;"></div>
        <div class="panel" id="panel-whatsapp" style="display: none;"></div>
        <div class="panel" id="panel-claude" style="display: none;"></div>
        <div class="panel" id="panel-cusa" style="display: none;"></div>
        <div class="panel" id="panel-roblox" style="display: none;"></div>
        <div class="panel" id="panel-github" style="display: none;"></div>
        <div class="panel" id="panel-notes" style="display: none;"></div>
        <div class="panel" id="panel-downloads" style="display: none;"></div>
        <div class="panel" id="panel-settings" style="display: none;">
          <div class="settings-content">
            <h2>Settings</h2>

            <div class="setting-group">
              <label class="setting-label">General</label>
              <div class="setting-row-label">Default Search Engine</div>
              <select id="setting-search-engine">
                <option value="google">Google</option>
                <option value="duckduckgo">DuckDuckGo</option>
                <option value="brave">Brave Search</option>
                <option value="bing">Bing</option>
              </select>
            </div>

            <div class="setting-group">
              <label class="setting-label">Appearance</label>
              <div class="setting-row-label">Theme Accent Color</div>
              <div id="setting-accent-colors" style="display:flex;gap:8px;margin-bottom:14px">
                <div class="accent-opt" data-color="#6366f1" style="background:#6366f1;width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent"></div>
                <div class="accent-opt" data-color="#00b4d8" style="background:#00b4d8;width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent"></div>
                <div class="accent-opt" data-color="#22c55e" style="background:#22c55e;width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent"></div>
                <div class="accent-opt" data-color="#e2231a" style="background:#e2231a;width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent"></div>
                <div class="accent-opt" data-color="#a855f7" style="background:#a855f7;width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent"></div>
                <div class="accent-opt" data-color="#f59e0b" style="background:#f59e0b;width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent"></div>
              </div>
              <div class="setting-toggle-row">
                <span>Show tabs sidebar</span>
                <label class="toggle">
                  <input type="checkbox" id="setting-tabs-visible" checked>
                  <span class="toggle-slider"></span>
                </label>
              </div>
            </div>

            <div class="setting-group">
              <label class="setting-label">Privacy &amp; Security</label>
              <div class="setting-toggle-row">
                <span>Block ads and trackers</span>
                <label class="toggle">
                  <input type="checkbox" id="setting-adblocker" checked>
                  <span class="toggle-slider"></span>
                </label>
              </div>
              <div style="margin-top:12px">
                <button id="setting-clear-data" style="padding:8px 16px;background:var(--danger);color:white;border:none;border-radius:var(--radius);cursor:pointer;font-family:'Outfit',sans-serif;font-size:13px">Clear Browsing Data</button>
              </div>
            </div>

            <div class="setting-group">
              <label class="setting-label">Sessions</label>
              <div class="setting-toggle-row">
                <span>Auto-save session every 10 minutes</span>
                <label class="toggle">
                  <input type="checkbox" id="setting-autosave">
                  <span class="toggle-slider"></span>
                </label>
              </div>
              <div style="margin-top:8px">
                <button id="setting-open-sessions" style="padding:8px 16px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;font-family:'Outfit',sans-serif;font-size:13px">Manage Sessions</button>
              </div>
            </div>

            <div class="setting-group">
              <label class="setting-label">Workspaces</label>
              <div style="margin-top:4px">
                <button id="setting-open-workspaces" style="padding:8px 16px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;font-family:'Outfit',sans-serif;font-size:13px">Manage Workspaces</button>
              </div>
            </div>

            <div class="setting-group">
              <label class="setting-label">Data</label>
              <div style="display:flex;gap:8px;flex-wrap:wrap">
                <button id="setting-export" style="padding:8px 16px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;font-family:'Outfit',sans-serif;font-size:13px">Export All Data</button>
                <button id="setting-reset" style="padding:8px 16px;background:var(--danger);color:white;border:none;border-radius:var(--radius);cursor:pointer;font-family:'Outfit',sans-serif;font-size:13px">Reset to Defaults</button>
              </div>
            </div>

            <div class="setting-group">
              <label class="setting-label">About</label>
              <p class="setting-info">Vex v0.3.0 — A browser built just for you.</p>
              <p class="setting-info muted">by 0xmortuex</p>
              <p class="setting-info muted" style="margin-top:4px"><a href="#" id="setting-github-link" style="color:var(--primary);text-decoration:none">GitHub Repository</a></p>
            </div>
          </div>
        </div>
      </div>

      <!-- Webviews Container -->
      <div id="webviews-container">
        <div id="split-divider"></div>
      </div>

      <!-- Split mini URL bars -->
      <div class="split-url-bar" id="split-url-left" style="position:absolute;top:0;left:0;width:50%;">
        <span class="split-url-text"></span>
      </div>
      <div class="split-url-bar" id="split-url-right" style="position:absolute;top:0;right:0;width:50%;">
        <span class="split-url-text"></span>
        <button class="split-close-btn" id="split-close-right" title="Exit split">
          <svg width="10" height="10" viewBox="0 0 10 10"><path d="M2 2L8 8M8 2L2 8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        </button>
      </div>

      <!-- PiP Button -->
      <button id="pip-btn" title="Picture-in-Picture (Ctrl+Shift+P)">
        <svg viewBox="0 0 16 16" fill="none"><rect x="1" y="2" width="14" height="11" rx="1.5" stroke="currentColor" stroke-width="1.3"/><rect x="8" y="7" width="6" height="5" rx="0.8" fill="currentColor" opacity="0.6"/></svg>
        PiP
      </button>

      <!-- Find Bar -->
      <div id="find-bar" style="display: none;">
        <input type="text" id="find-input" placeholder="Find in page...">
        <span id="find-count"></span>
        <button id="find-prev" class="find-btn">
          <svg width="12" height="12" viewBox="0 0 12 12"><path d="M9 8L6 5L3 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
        <button id="find-next" class="find-btn">
          <svg width="12" height="12" viewBox="0 0 12 12"><path d="M3 4L6 7L9 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
        <button id="find-close" class="find-btn">
          <svg width="12" height="12" viewBox="0 0 12 12"><path d="M3 3L9 9M9 3L3 9" stroke="currentColor" stroke-width="1" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Command Bar Overlay -->
  <div id="command-overlay" style="display: none;">
    <div id="command-bar">
      <div id="command-input-wrapper">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.5"/><path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <input type="text" id="command-input" placeholder="Ask Vex anything or type a URL..." spellcheck="false" autocomplete="off">
        <kbd>ESC</kbd>
      </div>
      <div id="command-results"></div>
    </div>
  </div>

  <!-- Split Tab Picker -->
  <div id="split-picker">
    <div id="split-picker-content">
      <h3>Choose a tab</h3>
    </div>
  </div>

  <!-- Sessions Overlay -->
  <div id="sessions-overlay"></div>

  <!-- Workspace Modal -->
  <div id="workspace-modal">
    <div class="ws-modal-content"></div>
  </div>

  <!-- Notification Toast -->
  <div id="toast" style="display: none;"></div>

  <script src="js/storage.js"></script>
  <script src="js/tabs.js"></script>
  <script src="js/webview.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/tools.js"></script>
  <script src="js/cusa-panel.js"></script>
  <script src="js/roblox-panel.js"></script>
  <script src="js/github-panel.js"></script>
  <script src="js/split.js"></script>
  <script src="js/start.js"></script>
  <script src="js/sessions.js"></script>
  <script src="js/workspaces.js"></script>
  <script src="js/notes-panel.js"></script>
  <script src="js/downloads-panel.js"></script>
  <script src="js/command.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
